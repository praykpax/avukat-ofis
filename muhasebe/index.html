<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İlyas PRAY</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f5f0;--sur:#ffffff;--sur2:#f0ede6;--brd:#e2ddd4;
  --acc:#b45309;--txt:#1c1917;--mut:#78716c;
  --grn:#15803d;--red:#b91c1c;--blu:#1d4ed8;--pur:#7c3aed;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--txt);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;}

/* ── LOGIN ── */
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;
  background:
    radial-gradient(ellipse at 15% 40%,rgba(180,83,9,.06) 0%,transparent 55%),
    radial-gradient(ellipse at 85% 15%,rgba(29,78,216,.04) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 100%,rgba(21,128,61,.03) 0%,transparent 50%),
    var(--bg);}
.l-wrap{width:100%;max-width:480px;}
.l-brand{text-align:center;margin-bottom:32px;}
.l-brand .title{font-family:'Bebas Neue',cursive;font-size:56px;letter-spacing:10px;color:var(--acc);line-height:1;}
.l-brand .title span{color:var(--txt);}
.l-brand .sub{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:5px;color:var(--mut);margin-top:10px;text-transform:uppercase;}

/* ── Login sekme kartı ── */
.l-card{background:var(--sur);border:1px solid var(--brd);border-radius:16px;overflow:hidden;
  box-shadow:0 4px 32px rgba(28,25,23,.10),0 1px 4px rgba(28,25,23,.06);}
.l-tabs{display:flex;border-bottom:1px solid var(--brd);}
.l-tab{flex:1;padding:16px 8px;background:none;border:none;font-family:'IBM Plex Mono',monospace;
  font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--mut);cursor:pointer;
  border-bottom:3px solid transparent;transition:all .2s;margin-bottom:-1px;position:relative;}
.l-tab:hover{color:var(--txt);background:var(--sur2);}
.l-tab.on{color:var(--acc);border-bottom-color:var(--acc);font-weight:700;background:var(--sur);}
.l-tab.on::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:var(--sur);}
.l-form-body{padding:32px 28px;}
.l-person-row{display:flex;align-items:center;gap:16px;margin-bottom:24px;}
.l-av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',cursive;font-size:24px;border:2px solid;flex-shrink:0;
  transition:all .25s;}
.l-pname{font-family:'Bebas Neue',cursive;font-size:30px;letter-spacing:3px;line-height:1;transition:color .2s;}
.l-psub{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--mut);letter-spacing:1px;margin-top:4px;}
.l-pass-lbl{display:block;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:2px;
  text-transform:uppercase;color:var(--mut);margin-bottom:8px;}
.l-pass-wrap{position:relative;}
.l-pass-inp{width:100%;background:var(--bg);border:1px solid var(--brd);border-radius:8px;
  padding:12px 16px;color:var(--txt);font-family:'IBM Plex Mono',monospace;font-size:18px;
  letter-spacing:6px;transition:border-color .15s,box-shadow .15s;}
.l-pass-inp:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px rgba(180,83,9,.12);}
.l-pass-inp::placeholder{letter-spacing:2px;color:var(--mut);font-size:13px;}
.l-err{margin-top:8px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--red);display:none;
  padding:6px 10px;background:rgba(185,28,28,.06);border-radius:4px;border-left:2px solid var(--red);}
.l-login-btn{width:100%;margin-top:16px;padding:13px;border:none;border-radius:8px;
  background:var(--acc);color:#fff;font-family:'IBM Plex Mono',monospace;font-size:12px;
  letter-spacing:3px;text-transform:uppercase;font-weight:700;cursor:pointer;transition:all .18s;}
.l-login-btn:hover{background:#92400e;transform:translateY(-1px);box-shadow:0 4px 12px rgba(180,83,9,.3);}
.l-login-btn:active{transform:translateY(0);}
.l-footer{padding:14px 28px;border-top:1px solid var(--brd);background:var(--sur2);
  display:flex;justify-content:center;}
.l-admin-link{background:none;border:none;color:var(--mut);cursor:pointer;
  font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;
  text-decoration:underline;transition:color .15s;padding:4px 0;}
.l-admin-link:hover{color:var(--acc);}
@keyframes l-shake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-6px);}40%,80%{transform:translateX(6px);}}

/* Şifre overlay */
.pover{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;align-items:center;justify-content:center;padding:20px;}
.pover.show{display:flex;}
.pbox{background:var(--sur);border:1px solid var(--brd);border-radius:12px;width:100%;max-width:340px;overflow:hidden;animation:pop .18s ease;}
@keyframes pop{from{opacity:0;transform:scale(.92);}to{opacity:1;transform:scale(1);}}
.pbox-hdr{padding:20px 24px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:12px;}
.pbox-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;font-size:18px;border:2px solid;flex-shrink:0;}
.pbox-name{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:2px;}
.pbox-sub{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--mut);margin-top:2px;}
.pbox-body{padding:20px 24px;}
.plabel{display:block;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--mut);margin-bottom:8px;}
.pinput{width:100%;background:var(--bg);border:1px solid var(--brd);border-radius:6px;padding:12px 14px;color:var(--txt);font-family:'IBM Plex Mono',monospace;font-size:16px;letter-spacing:4px;transition:border-color .15s;}
.pinput:focus{outline:none;border-color:var(--acc);}
.pinput::placeholder{letter-spacing:2px;color:var(--mut);font-size:13px;}
.perr{margin-top:8px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--red);display:none;}
.pacts{display:flex;gap:10px;margin-top:14px;}
.pbtn2{flex:1;padding:11px;border:none;border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:700;cursor:pointer;transition:all .16s;}
.pbtn2.ok{background:var(--acc);color:#fff;}
.pbtn2.ok:hover{background:#92400e;}
.pbtn2.cancel{background:var(--sur2);color:var(--mut);border:1px solid var(--brd);}
.pbtn2.cancel:hover{color:var(--txt);}

/* ── APP ── */
#app{display:none;}
.hdr{background:var(--sur);border-bottom:2px solid var(--acc);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:300;box-shadow:0 1px 8px rgba(28,25,23,.07);}
.logo{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:4px;color:var(--acc);}
.logo span{color:var(--txt);}
.hdr-r{display:flex;align-items:center;gap:10px;}
.sind{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;padding:4px 10px;border-radius:4px;transition:all .3s;}
.sind.ok{color:var(--grn);background:rgba(21,128,61,.08);border:1px solid rgba(21,128,61,.2);}
.sind.bsy{color:var(--acc);background:rgba(180,83,9,.08);border:1px solid rgba(180,83,9,.2);}
.sind.err{color:var(--red);background:rgba(185,28,28,.08);border:1px solid rgba(185,28,28,.2);}
.ubadge{display:flex;align-items:center;gap:8px;padding:5px 12px;background:var(--sur2);border:1px solid var(--brd);border-radius:20px;}
.udot{width:8px;height:8px;border-radius:50%;}
.uname{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;}
.lbtn{background:none;border:1px solid var(--brd);border-radius:4px;color:var(--mut);cursor:pointer;font-size:10px;padding:4px 10px;font-family:'IBM Plex Mono',monospace;letter-spacing:1px;transition:all .12s;}
.lbtn:hover{border-color:var(--red);color:var(--red);}
.tabs{background:var(--sur);border-bottom:1px solid var(--brd);padding:0 8px;display:flex;overflow-x:auto;position:sticky;top:56px;z-index:200;}
.tabs::-webkit-scrollbar{height:3px;}
.tabs::-webkit-scrollbar-thumb{background:var(--brd);}
.tbtn{padding:12px 22px;background:none;border:none;color:var(--mut);font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;border-bottom:3px solid transparent;transition:all .18s;white-space:nowrap;}
.tbtn:hover{color:var(--txt);}
.tbtn.on{color:var(--acc);border-bottom-color:var(--acc);}
.main{padding:24px;max-width:1500px;margin:0 auto;}
.panel{display:none;}.panel.on{display:block;}

/* Stat */
.srow{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;}
.sc{background:var(--sur);border:1px solid var(--brd);border-radius:8px;padding:18px 22px;position:relative;overflow:hidden;box-shadow:0 1px 4px rgba(28,25,23,.05);}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.sc.bl::before{background:var(--blu);}
.sc.gr::before{background:var(--grn);}
.sc.ac::before{background:var(--acc);}
.sc.rd::before{background:var(--red);}
.slbl{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--mut);margin-bottom:6px;}
.sval{font-family:'Bebas Neue',cursive;font-size:32px;letter-spacing:1px;}
.sc.bl .sval{color:var(--blu);}
.sc.gr .sval{color:var(--grn);}
.sc.ac .sval{color:var(--acc);}
.sc.rd .sval{color:var(--red);}
.ssub{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--mut);margin-top:4px;}

.stit{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--mut);margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.stit::after{content:'';flex:1;height:1px;background:var(--brd);}
.ptrow{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.ptit{font-family:'Bebas Neue',cursive;font-size:28px;letter-spacing:2px;}
.ebtn{background:none;border:1px solid var(--brd);border-radius:4px;color:var(--mut);cursor:pointer;font-size:10px;padding:4px 10px;font-family:'IBM Plex Mono',monospace;transition:all .12s;}
.ebtn:hover{border-color:var(--acc);color:var(--acc);}

/* Form */
.tforms{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:22px;}
.fc{background:var(--sur);border:1px solid var(--brd);border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(28,25,23,.05);}
.fc-h{padding:11px 16px;border-bottom:1px solid var(--brd);font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;gap:8px;}
.fc-h.ac{color:var(--acc);}.fc-h.gr{color:var(--grn);}.fc-h.bl{color:var(--blu);}
.fc-b{padding:14px 16px;}
.flbl{display:block;font-size:9px;color:var(--mut);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;font-family:'IBM Plex Mono',monospace;}
.fi,.fs{width:100%;background:var(--bg);border:1px solid var(--brd);border-radius:4px;padding:7px 10px;color:var(--txt);font-family:'IBM Plex Sans',sans-serif;font-size:13px;transition:border-color .12s;}
.fi:focus,.fs:focus{outline:none;border-color:var(--acc);}
.fi::placeholder{color:var(--mut);}
.fi.ro{color:var(--blu);background:rgba(29,78,216,.04);cursor:default;}
.g4{display:grid;grid-template-columns:2fr 2fr 1fr 1fr;gap:8px;margin-bottom:8px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px;}
.btn{width:100%;padding:9px;border:none;border-radius:4px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-weight:700;transition:all .16s;}
.btn.ac{background:var(--acc);color:#fff;}.btn.ac:hover{background:#92400e;}
.btn.gr{background:var(--grn);color:#fff;}.btn.gr:hover{background:#166534;}
.btn.rd{background:rgba(185,28,28,.08);color:var(--red);border:1px solid rgba(185,28,28,.25);}
.btn.rd:hover{background:rgba(185,28,28,.15);}

/* Tablo */
.cgrid{display:grid;grid-template-columns:1fr 270px;gap:18px;}
.twrap{background:var(--sur);border:1px solid var(--brd);border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(28,25,23,.05);}
.tbar{padding:10px 14px;border-bottom:1px solid var(--brd);display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.tsrch{background:var(--bg);border:1px solid var(--brd);border-radius:4px;padding:6px 10px;color:var(--txt);font-family:'IBM Plex Mono',monospace;font-size:11px;width:150px;}
.tsrch::placeholder{color:var(--mut);}
.tsrch:focus{outline:none;border-color:var(--acc);}
.tsel{background:var(--bg);border:1px solid var(--brd);border-radius:4px;padding:6px 10px;color:var(--txt);font-family:'IBM Plex Mono',monospace;font-size:11px;cursor:pointer;}
.sbtn{background:var(--bg);border:1px solid var(--brd);border-radius:4px;padding:6px 10px;color:var(--mut);font-family:'IBM Plex Mono',monospace;font-size:10px;cursor:pointer;transition:all .12s;}
.sbtn:hover,.sbtn.on{border-color:var(--acc);color:var(--acc);}
table{width:100%;border-collapse:collapse;}
thead th{padding:9px 12px;text-align:left;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--mut);background:var(--sur2);border-bottom:1px solid var(--brd);white-space:nowrap;cursor:pointer;user-select:none;}
thead th:hover{color:var(--txt);}
tbody tr{border-bottom:1px solid var(--brd);transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--sur2);}
tbody td{padding:9px 12px;font-size:12px;}
.tdate{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mut);}
.tprod{font-weight:500;}
.tnum{font-family:'IBM Plex Mono',monospace;font-size:11px;text-align:right;}
.ttot{font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--blu);text-align:right;}
.tfoot td{padding:10px 12px;font-family:'IBM Plex Mono',monospace;font-weight:600;background:var(--sur2);border-top:2px solid var(--brd);font-size:11px;}
.xb{background:none;border:none;color:var(--mut);cursor:pointer;font-size:12px;padding:2px 5px;border-radius:3px;transition:all .1s;}
.xb:hover{background:rgba(185,28,28,.10);color:var(--red);}
.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:10px;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;margin-left:5px;}

/* Sağ */
.rcol{display:flex;flex-direction:column;gap:14px;}
.plist{display:flex;flex-direction:column;gap:5px;max-height:240px;overflow-y:auto;}
.prow{display:flex;align-items:center;gap:6px;padding:7px 10px;background:var(--bg);border:1px solid var(--brd);border-radius:5px;}
.pnm{font-size:11px;font-weight:500;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pqt{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--mut);}
.ptl{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:var(--blu);white-space:nowrap;}
.paylist{display:flex;flex-direction:column;gap:5px;max-height:200px;overflow-y:auto;}
.payrow{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:var(--bg);border:1px solid var(--brd);border-radius:4px;}
.payd{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mut);}
.payw{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--pur);}
.paya{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:var(--grn);}
.empty{color:var(--mut);font-family:'IBM Plex Mono',monospace;font-size:10px;}

/* Borç view */
.dview{max-width:640px;}
.dinfo{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mut);margin-bottom:20px;line-height:1.8;padding:12px 16px;background:var(--sur);border:1px solid var(--brd);border-radius:6px;}
.dcard{background:var(--sur);border:1px solid var(--brd);border-radius:10px;overflow:hidden;margin-bottom:16px;transition:all .18s;box-shadow:0 1px 4px rgba(28,25,23,.05);}
.dcard:hover{border-color:rgba(185,28,28,.3);box-shadow:0 4px 12px rgba(185,28,28,.08);}
.dcard-h{padding:18px 22px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:14px;}
.dav{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;font-size:21px;border:2px solid;flex-shrink:0;}
.dsn{font-family:'Bebas Neue',cursive;font-size:24px;letter-spacing:2px;line-height:1;}
.dsr{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--mut);letter-spacing:1px;margin-top:3px;}
.dnum{padding:16px 22px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.dnl{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--mut);text-transform:uppercase;}
.dnv{font-family:'Bebas Neue',cursive;font-size:28px;letter-spacing:1px;margin-top:3px;}
.dpay{padding:14px 22px;background:var(--sur2);border-top:1px solid var(--brd);display:flex;align-items:center;gap:10px;}
.dpi{flex:1;background:var(--bg);border:1px solid var(--brd);border-radius:4px;padding:8px 12px;color:var(--txt);font-family:'IBM Plex Mono',monospace;font-size:13px;}
.dpi:focus{outline:none;border-color:var(--grn);}
.dpi::placeholder{color:var(--mut);}
.dpd{background:var(--bg);border:1px solid var(--brd);border-radius:4px;padding:8px 10px;color:var(--txt);font-family:'IBM Plex Mono',monospace;font-size:12px;width:140px;}
.dpb{background:var(--grn);color:#fff;border:none;border-radius:4px;padding:9px 16px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;font-weight:700;cursor:pointer;transition:all .16s;white-space:nowrap;}
.dpb:hover{background:#166534;}

/* Admin kartlar */
.agrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:28px;}
.acard{background:var(--sur);border:1px solid var(--brd);border-radius:10px;overflow:hidden;transition:all .18s;box-shadow:0 1px 4px rgba(28,25,23,.05);}
.acard:hover{box-shadow:0 4px 16px rgba(28,25,23,.10);border-color:var(--acc);}
.acard-h{padding:16px 20px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:12px;}
.aav{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;font-size:19px;border:2px solid;flex-shrink:0;}
.acard-s{padding:12px 20px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.acsl{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:1px;}
.acsv{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;margin-top:2px;}
.acard-f{padding:8px 20px;background:var(--sur2);border-top:1px solid var(--brd);font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--mut);display:flex;justify-content:space-between;align-items:center;}
.gobtn{color:var(--acc);cursor:pointer;font-weight:700;}

/* Modal */
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;align-items:center;justify-content:center;}
.mov.show{display:flex;}
.mbox{background:var(--sur);border:1px solid var(--brd);border-radius:10px;width:380px;max-width:95vw;overflow:hidden;animation:pop .18s ease;}
.mhdr{padding:15px 20px;border-bottom:1px solid var(--brd);display:flex;justify-content:space-between;align-items:center;}
.mtit{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--acc);}
.mx{background:none;border:none;color:var(--mut);cursor:pointer;font-size:16px;}
.mx:hover{color:var(--txt);}
.mbody{padding:20px;}
.cpick{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}
.co{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .14s;}
.co:hover,.co.on{border-color:#1c1917;transform:scale(1.12);}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px;}
@media(max-width:1100px){.cgrid{grid-template-columns:1fr;}}
@media(max-width:900px){.tforms{grid-template-columns:1fr;}.g4{grid-template-columns:1fr 1fr;}}

</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="l-wrap">
    <div class="l-brand">
      <div class="title">İLYAS <span>PRAY</span></div>

    </div>
    <div class="l-card">
      <div class="l-tabs" id="l-tabs"></div>

        <div class="l-person-row">

            <div class="l-pname" id="l-pname"></div>
            <div class="l-psub">Kişisel hesap</div>
          </div>
        </div>
        <label class="l-pass-lbl">Şifre</label>

</div>

<!-- Şifre Modal -->
<div class="pover" id="pover">
  <div class="pbox">
    <div class="pbox-hdr">
      <div class="pbox-av" id="pav"></div>
      <div>
        <div class="pbox-name" id="pname"></div>
        <div class="pbox-sub">Şifrenizi girin</div>
      </div>
    </div>
    <div class="pbox-body">
      <label class="plabel">Şifre</label>
      <input type="password" class="pinput" id="pinput" placeholder="••••••"

<!-- APP -->

      <div class="ubadge">
        <div class="udot" id="udot"></div>

      </div>

    </div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="main" id="main"></div>
</div>

<!-- Kişi Modal (Admin) -->
<div class="mov" id="pmov">
  <div class="mbox">
    <div class="mhdr">
      <span class="mtit" id="pmov-title">Kişi</span>
      <button class="mx" onclick="closePMov()">✕</button>
    </div>
    <div class="mbody">
      <div style="margin-bottom:10px;"><label class="flbl">Ad Soyad</label><input type="text" class="fi" id="pm-n"></div>
      <div style="margin-bottom:10px;"><label class="flbl">Şifre</label><input type="text" class="fi" id="pm-p" placeholder="Şifre..."></div>
      <div style="margin-bottom:12px;"><label class="flbl">Renk</label><div class="cpick" id="pm-cp"></div></div>
      <input type="hidden" id="pm-id">
      <div style="display:flex;gap:8px;">
        <button class="btn ac" style="flex:1;" onclick="savePMov()">Kaydet</button>
        <button class="btn rd" style="width:auto;padding:9px 16px;" id="pm-del" onclick="delPMov()">Sil</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ════════════════════════════════
   GOOGLE DRIVE BACKEND
════════════════════════════════ */
const GAS_URL='https://script.google.com/macros/s/AKfycbxWGtv9z69zEuAdqtdqaQWxA0VRKU5b28SEA2rRh-bj_iKyQ-oPSX6xbTLcN7tmsndpNQ/exec';

async function dbGet(){
  const r=await fetch(GAS_URL);
  if(!r.ok) throw new Error('HTTP '+r.status);
  const t=await r.text();
  return t?JSON.parse(t):null;
}
async function dbSet(data){
  await fetch(GAS_URL,{
    method:'POST',
    mode:'no-cors',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify(data)
  });
}

/* ════════════════════════════════
   RENKLER
════════════════════════════════ */
const PAL={
  gold:{h:'#f0c040',b:'rgba(240,192,64,.13)'},
  blue:{h:'#5a9ee0',b:'rgba(90,158,224,.13)'},
  green:{h:'#3ecf6a',b:'rgba(62,207,106,.13)'},
  red:{h:'#e05a5a',b:'rgba(224,90,90,.13)'},
  purple:{h:'#a78bfa',b:'rgba(167,139,250,.13)'},
  orange:{h:'#e07a2b',b:'rgba(224,122,43,.13)'},
  pink:{h:'#f472b6',b:'rgba(244,114,182,.13)'},
  teal:{h:'#2dd4bf',b:'rgba(45,212,191,.13)'},
};
const PK=Object.keys(PAL);
const ch=c=>(PAL[c]||PAL.gold).h;
const cb=c=>(PAL[c]||PAL.gold).b;

/* ════════════════════════════════
   STATE
════════════════════════════════ */
const ADMIN_PID='__admin__';
const ADMIN_PASS='126254Pray.';
const LS_KEY='ilaypray_v3';

let DB={persons:{},pidSeq:0,order:[]};
let ME=null; // {pid, name, color, isAdmin}
let pmColor='gold';
let sortMap={};
let saveTimer=null;

const td=()=>new Date().toISOString().split('T')[0];
const fmt=n=>new Intl.NumberFormat('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n||0);
const fmtK=n=>{n=n||0;if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1000)return Math.round(n/1000)+'K';return fmt(n);};
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function calcT(sellerPid,buyerPid){
  const p=DB.persons[sellerPid];
  const sales=buyerPid?p.sales.filter(r=>r.buyerPid===buyerPid):p.sales;
  const pays=buyerPid?p.payments.filter(r=>r.fromPid===buyerPid):p.payments;
  const total=sales.reduce((s,r)=>s+r.qty*r.price,0);
  const paid=pays.reduce((s,r)=>s+r.amount,0);
  return{total,paid,bal:total-paid};
}
function prods(pid,buyerPid){
  const m={};
  const sales=buyerPid?DB.persons[pid].sales.filter(r=>r.buyerPid===buyerPid):DB.persons[pid].sales;
  sales.forEach(r=>{
    const k=r.product.toLowerCase().trim();
    if(!m[k])m[k]={name:r.product,qty:0,tot:0};
    m[k].qty+=r.qty;m[k].tot+=r.qty*r.price;
  });
  return Object.values(m).sort((a,b)=>b.tot-a.tot);
}
function flash(el,msg){
  if(!el)return;
  const op=el.placeholder;
  el.style.borderColor='var(--red)';el.placeholder=msg;el.focus();
  setTimeout(()=>{if(el){el.style.borderColor='';el.placeholder=op;}},3000);
}
function cpick(cid,cur,cb2){
  const el=document.getElementById(cid);if(!el)return;
  el.innerHTML='';
  PK.forEach(c=>{
    const d=document.createElement('div');
    d.className='co'+(c===cur?' on':'');
    d.style.background=ch(c);
    d.onclick=()=>{el.querySelectorAll('.co').forEach(x=>x.classList.remove('on'));d.classList.add('on');cb2(c);};
    el.appendChild(d);
  });
}

/* ════════════════════════════════
   KAYDET
════════════════════════════════ */
function setSind(s,t){const e=document.getElementById('sind');if(e){e.className='sind '+s;e.textContent=t;}}
function save(){
  setSind('bsy','⏳ KAYEDİLİYOR...');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    try{await dbSet(DB);setSind('ok','☁ SENKRON');}
    catch(e){setSind('err','⚠ '+(e.message||'Bağlantı hatası'));}
  },600);
}

/* ════════════════════════════════
   GİRİŞ
════════════════════════════════ */
function buildLogin(){
  const tabs=document.getElementById('l-tabs');
  if(!tabs)return;
  tabs.innerHTML='';
  const pids=DB.order.filter(pid=>DB.persons[pid]);
  pids.forEach((pid,i)=>{
    const p=DB.persons[pid];
    const btn=document.createElement('button');
    btn.className='l-tab'+(i===0?' on':'');
    btn.dataset.pid=pid;
    btn.textContent=p.name;
    btn.onclick=()=>selectLoginTab(pid);
    tabs.appendChild(btn);
  });
  // İlk kişiyi seç
  if(pids.length>0)selectLoginTab(pids[0]);
}

function selectLoginTab(pid){
  document.querySelectorAll('.l-tab').forEach(b=>b.classList.remove('on'));
  const btn=document.querySelector(`.l-tab[data-pid="${pid}"]`);
  if(btn)btn.classList.add('on');
  pendingPid=pid;
  const p=DB.persons[pid];if(!p)return;
  const c=ch(p.color);
  const av=document.getElementById('l-av');
  if(av){av.style.cssText=`background:${cb(p.color)};border-color:${c};color:${c};`;av.textContent=p.name[0].toUpperCase();}
  const nm=document.getElementById('l-pname');
  if(nm){nm.style.color=c;nm.textContent=p.name;}
  const inp=document.getElementById('l-pass');
  if(inp)inp.value='';
  const err=document.getElementById('l-err');
  if(err)err.style.display='none';
}

function doLogin(){
  const inp=document.getElementById('l-pass');
  const err=document.getElementById('l-err');
  const pass=inp?.value||'';
  if(!pass)return;
  const ok=DB.persons[pendingPid]&&pass===DB.persons[pendingPid].password;
  if(!ok){
    if(err)err.style.display='block';
    if(inp){inp.style.animation='l-shake .4s ease';inp.addEventListener('animationend',()=>{inp.style.animation='';},{once:true});inp.value='';inp.focus();}
    return;
  }
  const p=DB.persons[pendingPid];
  ME={pid:pendingPid,name:p.name,color:p.color,isAdmin:false};
  localStorage.setItem(LS_KEY,JSON.stringify(ME));
  startApp();
}

let pendingPid=null;
function openPover(pid){
  pendingPid=pid;
  const isA=(pid===ADMIN_PID);
  const u=isA?{name:'Yönetici',color:'purple'}:DB.persons[pid];
  if(!u)return;
  const c=ch(u.color);
  const av=document.getElementById('pav');
  av.style.cssText=`background:${cb(u.color)};border-color:${c};color:${c};`;
  av.textContent=u.name[0].toUpperCase();
  document.getElementById('pname').textContent=u.name;
  document.getElementById('pinput').value='';
  document.getElementById('perr').style.display='none';
  document.getElementById('pok').textContent='Giriş Yap';
  document.getElementById('pover').classList.add('show');
  setTimeout(()=>document.getElementById('pinput').focus(),100);
}
function closePover(){
  document.getElementById('pover').classList.remove('show');
  // Admin modal kapandıktan sonra seçili sekmeye geri dön
  const lastTab=document.querySelector('.l-tab.on');
  pendingPid=lastTab?lastTab.dataset.pid:null;
}
document.getElementById('pover').onclick=e=>{if(e.target===document.getElementById('pover'))closePover();};

function tryLogin(){
  const pass=document.getElementById('pinput').value;
  const errEl=document.getElementById('perr');
  const btn=document.getElementById('pok');
  if(!pass)return;

  const isA=(pendingPid===ADMIN_PID);
  const ok=isA?(pass===ADMIN_PASS):(DB.persons[pendingPid]&&pass===DB.persons[pendingPid].password);

  if(!ok){
    errEl.style.display='block';
    document.getElementById('pinput').style.borderColor='var(--red)';
    setTimeout(()=>{document.getElementById('pinput').style.borderColor='';},2000);
    document.getElementById('pinput').value='';
    document.getElementById('pinput').focus();
    return;
  }

  // BAŞARILI GİRİŞ
  btn.textContent='✓';
  if(isA){
    ME={pid:ADMIN_PID,name:'Yönetici',color:'purple',isAdmin:true};
  } else {
    const p=DB.persons[pendingPid];
    ME={pid:pendingPid,name:p.name,color:p.color,isAdmin:false};
  }
  localStorage.setItem(LS_KEY,JSON.stringify(ME));
  closePover();
  startApp();
}

function logout(){
  if(!confirm('Çıkış yapılsın mı?'))return;
  localStorage.removeItem(LS_KEY);
  location.reload();
}

/* ════════════════════════════════
   UYGULAMA BAŞLAT
════════════════════════════════ */
function startApp(){
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  const c=ch(ME.color);
  document.getElementById('udot').style.background=c;
  document.getElementById('uname').textContent=ME.name.toUpperCase();
  document.getElementById('tabs').innerHTML='';
  document.getElementById('main').innerHTML='';
  if(ME.isAdmin) buildAdmin();
  else buildUser();
}

function addTab(id,label){
  const btn=document.createElement('button');
  btn.className='tbtn';btn.id='T-'+id;btn.textContent=label;
  btn.onclick=()=>showTab(id);
  document.getElementById('tabs').appendChild(btn);
}
function showTab(id){
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('T-'+id)?.classList.add('on');
  document.getElementById('P-'+id)?.classList.add('on');
}
function addPanel(id,html){
  const d=document.createElement('div');
  d.className='panel';d.id='P-'+id;d.innerHTML=html;
  document.getElementById('main').appendChild(d);
}

/* ════════════════════════════════
   KULLANICI PANELİ — İLİŞKİ BAZLI
════════════════════════════════ */
function buildUser(){
  const pid=ME.pid;
  const others=DB.order.filter(id=>id!==pid&&DB.persons[id]);
  others.forEach(buyerPid=>{
    const buyer=DB.persons[buyerPid];
    addTab('rel-'+buyerPid, buyer.name);
    buildRelPanel(pid, buyerPid);
  });
  if(others.length>0)showTab('rel-'+others[0]);
}

function buildRelPanel(sellerPid,buyerPid){
  const seller=DB.persons[sellerPid];
  const buyer=DB.persons[buyerPid];
  const sc=ch(seller.color);
  const sid=`rel-${buyerPid}`;
  if(!sortMap[sid])sortMap[sid]={col:'date',dir:'desc'};

  addPanel('rel-'+buyerPid,`
    <div class="ptrow">
      <div class="ptit" style="color:${sc};">${esc(seller.name)}'IN ${esc(buyer.name.toUpperCase())}'YE SATTIĞI</div>
    </div>
    <div class="srow" id="${sid}-stats"></div>
    <div class="tforms">
      <div class="fc">
        <div class="fc-h ac">+ YENİ KAYIT EKLE</div>
        <div class="fc-b">
          <div class="g4">
            <div><label class="flbl">Tarih</label><input type="date" class="fi" id="${sid}-nd" value="${td()}"></div>
            <div><label class="flbl">Ürün Adı</label><input type="text" class="fi" id="${sid}-np" placeholder="Ürün..." list="${sid}-dl" autocomplete="off"><datalist id="${sid}-dl"></datalist></div>
            <div><label class="flbl">Adet</label><input type="number" class="fi" id="${sid}-nq" placeholder="0" min="1" oninput="relAuto('${sid}')"></div>
            <div><label class="flbl">Birim ₺</label><input type="number" class="fi" id="${sid}-npr" placeholder="0.00" step="0.01" oninput="relAuto('${sid}')"></div>
          </div>
          <div class="g2">
            <div><label class="flbl">Toplam (Otomatik)</label><input class="fi ro" id="${sid}-auto" placeholder="—" readonly></div>
            <div style="display:flex;align-items:flex-end;"><button class="btn ac" style="margin-bottom:0;" onclick="relSave('${sellerPid}','${buyerPid}')">💾 KAYDET</button></div>
          </div>
        </div>
      </div>
      <div class="fc">
        <div class="fc-h gr">💰 ÖDEME EKLE</div>
        <div class="fc-b">
          <div class="g2">
            <div><label class="flbl">Tarih</label><input type="date" class="fi" id="${sid}-pd" value="${td()}"></div>
            <div><label class="flbl">Tutar ₺</label><input type="number" class="fi" id="${sid}-pa" placeholder="0.00" step="0.01"></div>
          </div>
          <button class="btn gr" onclick="relPay('${sellerPid}','${buyerPid}')">💾 KAYDET</button>
        </div>
      </div>
    </div>
    <div class="cgrid">
      <div>
        <div class="stit">Kayıtlar</div>
        <div class="twrap">
          <div class="tbar">
            <input type="text" class="tsrch" placeholder="Ürün ara..." id="${sid}-srch" oninput="relTable('${sellerPid}','${buyerPid}')">
            <select class="tsel" id="${sid}-fprod" onchange="relTable('${sellerPid}','${buyerPid}')"><option value="">Tüm Ürünler</option></select>
            <button class="sbtn on" id="${sid}-sd" onclick="relSort('${sellerPid}','${buyerPid}','date','desc')">↓ En Yeni</button>
            <button class="sbtn" id="${sid}-sa" onclick="relSort('${sellerPid}','${buyerPid}','date','asc')">↑ En Eski</button>
          </div>
          <div style="max-height:520px;overflow-y:auto;">
            <table><thead><tr>
              <th onclick="relCol('${sellerPid}','${buyerPid}','date')">Tarih ↕</th>
              <th onclick="relCol('${sellerPid}','${buyerPid}','product')">Ürün ↕</th>
              <th style="text-align:right;" onclick="relCol('${sellerPid}','${buyerPid}','qty')">Adet ↕</th>
              <th style="text-align:right;">Birim ₺</th>
              <th style="text-align:right;" onclick="relCol('${sellerPid}','${buyerPid}','total')">Toplam ↕</th>
              <th></th>
            </tr></thead>
            <tbody id="${sid}-tbody"></tbody>
            <tfoot><tr class="tfoot" id="${sid}-tfoot"></tr></tfoot>
            </table>
          </div>
        </div>
      </div>
      <div class="rcol">
        <div class="fc"><div class="fc-h bl">📦 Ürün Özeti</div><div class="fc-b" style="padding:10px 12px;"><div class="plist" id="${sid}-prods"></div></div></div>
        <div class="fc"><div class="fc-h gr">📋 Ödeme Geçmişi</div><div class="fc-b" style="padding:10px 12px;"><div class="paylist" id="${sid}-pays"></div></div></div>
      </div>
    </div>`);

  relRender(sellerPid,buyerPid);
}

function relRender(sellerPid,buyerPid){
  const sid=`rel-${buyerPid}`;
  const p=DB.persons[sellerPid];
  const{total,paid,bal}=calcT(sellerPid,buyerPid);
  const cnt=p.sales.filter(r=>r.buyerPid===buyerPid).length;
  const qty=p.sales.filter(r=>r.buyerPid===buyerPid).reduce((s,r)=>s+r.qty,0);

  const se=document.getElementById(sid+'-stats');
  if(se)se.innerHTML=`
    <div class="sc bl"><div class="slbl">Toplam Alacak</div><div class="sval">₺${fmt(total)}</div><div class="ssub">${qty} adet · ${cnt} kayıt</div></div>
    <div class="sc gr"><div class="slbl">Toplam Ödeme</div><div class="sval">₺${fmt(paid)}</div></div>
    <div class="sc ${bal>0?'ac':'gr'}"><div class="slbl">Kalan Bakiye</div><div class="sval" style="color:${bal>0?'var(--acc)':'var(--grn)'};">₺${fmt(bal)}</div></div>`;

  const ps=prods(sellerPid,buyerPid);
  const pe=document.getElementById(sid+'-prods');
  if(pe)pe.innerHTML=ps.length?ps.map(r=>`<div class="prow"><span class="pnm">${esc(r.name)}</span><span class="pqt">${r.qty} ad</span><span class="ptl">₺${fmt(r.tot)}</span></div>`).join(''):'<div class="empty">Kayıt yok</div>';
  const dl=document.getElementById(sid+'-dl');
  if(dl){dl.innerHTML='';ps.forEach(r=>{const o=document.createElement('option');o.value=r.name;dl.appendChild(o);});}
  const fp=document.getElementById(sid+'-fprod');
  if(fp){const cv=fp.value;fp.innerHTML='<option value="">Tüm Ürünler</option>';ps.forEach(r=>{const o=document.createElement('option');o.value=r.name.toLowerCase();o.textContent=r.name;fp.appendChild(o);});fp.value=cv;}

  const pays=p.payments.filter(r=>r.fromPid===buyerPid);
  const paye=document.getElementById(sid+'-pays');
  if(paye)paye.innerHTML=pays.length
    ?[...pays].reverse().map(pay=>`
        <div class="payrow">
          <span class="payd">${pay.date||'—'}</span>
          <div style="display:flex;align-items:center;gap:6px;">
            <span class="paya">+₺${fmt(pay.amount)}</span>
            <button class="xb" onclick="relDelPay('${sellerPid}','${pay.id}','${buyerPid}')">✕</button>
          </div>
        </div>`).join('')
    :'<div class="empty">Ödeme yok</div>';

  relTable(sellerPid,buyerPid);
}

function relSort(sellerPid,buyerPid,col,dir){
  const sid=`rel-${buyerPid}`;
  sortMap[sid]={col,dir};
  document.getElementById(sid+'-sa')?.classList.toggle('on',col==='date'&&dir==='asc');
  document.getElementById(sid+'-sd')?.classList.toggle('on',col==='date'&&dir==='desc');
  relTable(sellerPid,buyerPid);
}
function relCol(sellerPid,buyerPid,col){
  const sid=`rel-${buyerPid}`;
  const s=sortMap[sid]||{col:'date',dir:'desc'};
  relSort(sellerPid,buyerPid,col,s.col===col&&s.dir==='desc'?'asc':'desc');
}
function relTable(sellerPid,buyerPid){
  const sid=`rel-${buyerPid}`;
  const p=DB.persons[sellerPid];
  const srch=(document.getElementById(sid+'-srch')?.value||'').toLowerCase().trim();
  const fv=(document.getElementById(sid+'-fprod')?.value||'').toLowerCase();
  const s=sortMap[sid]||{col:'date',dir:'desc'};
  let rows=p.sales.filter(r=>r.buyerPid===buyerPid&&(!srch||r.product.toLowerCase().includes(srch))&&(!fv||r.product.toLowerCase()===fv));
  rows=[...rows].sort((a,b)=>{
    let va,vb;
    if(s.col==='date'){va=a.date||'';vb=b.date||'';}
    else if(s.col==='product'){va=a.product.toLowerCase();vb=b.product.toLowerCase();}
    else if(s.col==='qty'){va=a.qty;vb=b.qty;}
    else if(s.col==='total'){va=a.qty*a.price;vb=b.qty*b.price;}
    else{va=a.date||'';vb=b.date||'';}
    if(va<vb)return s.dir==='asc'?-1:1;if(va>vb)return s.dir==='asc'?1:-1;return 0;
  });
  const tb=document.getElementById(sid+'-tbody');if(!tb)return;
  tb.innerHTML=rows.map(r=>`<tr>
    <td class="tdate">${r.date||'—'}</td>
    <td class="tprod">${esc(r.product)}</td>
    <td class="tnum">${r.qty}</td>
    <td class="tnum">₺${fmt(r.price)}</td>
    <td class="ttot">₺${fmt(r.qty*r.price)}</td>
    <td><button class="xb" onclick="relDel('${sellerPid}','${r.id}','${buyerPid}')">✕</button></td></tr>`).join('');
  const tf=document.getElementById(sid+'-tfoot');if(!tf)return;
  const ft=rows.reduce((s,r)=>s+r.qty*r.price,0);
  const fq=rows.reduce((s,r)=>s+r.qty,0);
  tf.innerHTML=`<td colspan="2" style="color:var(--mut);">${rows.length} kayıt · ${fq} adet</td><td colspan="3" style="text-align:right;color:var(--acc);">₺${fmt(ft)}</td><td></td>`;
}
function relAuto(sid){
  const q=parseFloat(document.getElementById(sid+'-nq')?.value)||0;
  const pr=parseFloat(document.getElementById(sid+'-npr')?.value)||0;
  const el=document.getElementById(sid+'-auto');
  if(el)el.value=q&&pr?'₺'+fmt(q*pr):'';
}
function relSave(sellerPid,buyerPid){
  const sid=`rel-${buyerPid}`;
  const np=document.getElementById(sid+'-np');
  const nq=document.getElementById(sid+'-nq');
  const npr=document.getElementById(sid+'-npr');
  const product=(np?.value||'').trim();
  const qty=parseFloat(nq?.value);
  const price=parseFloat(npr?.value);
  if(!product){flash(np,'Ürün adı giriniz');return;}
  if(!qty||qty<=0){flash(nq,'Geçerli adet');return;}
  if(!price||price<=0){flash(npr,'Geçerli fiyat');return;}
  DB.persons[sellerPid].sales.push({
    id:'s'+Date.now()+'_'+Math.random().toString(36).slice(2,5),
    date:document.getElementById(sid+'-nd')?.value||'',
    product,qty,price,buyerPid
  });
  np.value='';nq.value='';npr.value='';
  document.getElementById(sid+'-auto').value='';
  save();relRender(sellerPid,buyerPid);
}
function relDel(sellerPid,id,buyerPid){
  if(!confirm('Sil?'))return;
  DB.persons[sellerPid].sales=DB.persons[sellerPid].sales.filter(r=>r.id!==id);
  save();relRender(sellerPid,buyerPid);
}
function relPay(sellerPid,buyerPid){
  const sid=`rel-${buyerPid}`;
  const pa=document.getElementById(sid+'-pa');
  const amount=parseFloat(pa?.value);
  if(!amount||amount<=0){flash(pa,'Geçerli tutar');return;}
  DB.persons[sellerPid].payments.push({
    id:'pay'+Date.now(),
    date:document.getElementById(sid+'-pd')?.value||'',
    amount,fromPid:buyerPid
  });
  pa.value='';save();relRender(sellerPid,buyerPid);
}
function relDelPay(sellerPid,id,buyerPid){
  DB.persons[sellerPid].payments=DB.persons[sellerPid].payments.filter(p=>p.id!==id);
  save();relRender(sellerPid,buyerPid);
}

function APadd(){
  const n=(document.getElementById('AP-n')?.value||'').trim();

  if(!n){alert('İsim giriniz.');return;}
  if(!p){alert('Şifre giriniz.');return;}

  const pid='p'+(++DB.pidSeq);
  DB.persons[pid]={pid,name:n,color:pmColor,password:p,sales:[],payments:[]};

  document.getElementById('AP-p').value='';

  const p=DB.persons[pid];

function Arender(pid){
  const p=DB.persons[pid];if(!p)return;
  const total=p.sales.reduce((s,r)=>s+r.qty*r.price,0);
  const paid=p.payments.reduce((s,r)=>s+r.amount,0);
  const bal=total-paid;
  const qty=p.sales.reduce((s,r)=>s+r.qty,0);
  const el=document.getElementById('APS-'+pid);
  if(el)el.innerHTML=`
    <div class="sc bl"><div class="slbl">Toplam Satış</div><div class="sval">₺${fmt(total)}</div><div class="ssub">${p.sales.length} kayıt · ${qty} adet</div></div>
    <div class="sc gr"><div class="slbl">Toplam Ödeme</div><div class="sval">₺${fmt(paid)}</div></div>
    <div class="sc ac"><div class="slbl">Kalan Bakiye</div><div class="sval">₺${fmt(bal)}</div></div>`;
  const ps=prods(pid,null);
  const pe=document.getElementById('A-prods-'+pid);
  if(pe)pe.innerHTML=ps.length?ps.map(r=>`<div class="prow"><span class="pnm">${esc(r.name)}</span><span class="pqt">${r.qty} ad</span><span class="ptl">₺${fmt(r.tot)}</span></div>`).join(''):'<div class="empty">Kayıt yok</div>';
  const dl=document.getElementById('A-dl-'+pid);
  if(dl){dl.innerHTML='';ps.forEach(r=>{const o=document.createElement('option');o.value=r.name;dl.appendChild(o);});}
  const tsel=document.getElementById('A-tsel-'+pid);
  if(tsel){const cv=tsel.value;tsel.innerHTML='<option value="">Tüm Ürünler</option>';ps.forEach(r=>{const o=document.createElement('option');o.value=r.name.toLowerCase();o.textContent=r.name;tsel.appendChild(o);});tsel.value=cv;}
  const paye=document.getElementById('A-pays-'+pid);
  if(paye)paye.innerHTML=p.payments.length
    ?[...p.payments].reverse().map(pay=>{
        const fn=pay.fromPid&&DB.persons[pay.fromPid]?DB.persons[pay.fromPid].name:'';
        return `<div class="payrow"><div><div class="payd">${pay.date||'—'}</div>${fn?`<div class="payw">← ${esc(fn)}</div>`:''}</div>
          <div style="display:flex;align-items:center;gap:6px;"><span class="paya">+₺${fmt(pay.amount)}</span><button class="xb" onclick="AdelPay('${pid}','${pay.id}')">✕</button></div></div>`;
      }).join(''):'<div class="empty">Ödeme yok</div>';
  Atable(pid);
}

function Asort(pid,col,dir){
  sortMap[pid]={col,dir};
  document.getElementById('A-sa-'+pid)?.classList.toggle('on',col==='date'&&dir==='asc');
  document.getElementById('A-sd-'+pid)?.classList.toggle('on',col==='date'&&dir==='desc');
  Atable(pid);
}
function Acol(pid,col){
  const s=sortMap[pid]||{col:'date',dir:'desc'};
  Asort(pid,col,s.col===col&&s.dir==='desc'?'asc':'desc');
}
function Atable(pid){
  const p=DB.persons[pid];if(!p)return;
  const srch=(document.getElementById('A-srch-'+pid)?.value||'').toLowerCase().trim();
  const fv=(document.getElementById('A-tsel-'+pid)?.value||'').toLowerCase();
  const s=sortMap[pid]||{col:'date',dir:'desc'};
  let rows=[...p.sales].filter(r=>(!srch||r.product.toLowerCase().includes(srch))&&(!fv||r.product.toLowerCase()===fv));
  rows.sort((a,b)=>{
    let va,vb;
    if(s.col==='date'){va=a.date||'';vb=b.date||'';}
    else if(s.col==='product'){va=a.product.toLowerCase();vb=b.product.toLowerCase();}
    else if(s.col==='qty'){va=a.qty;vb=b.qty;}
    else if(s.col==='total'){va=a.qty*a.price;vb=b.qty*b.price;}
    else{va=a.date||'';vb=b.date||'';}
    if(va<vb)return s.dir==='asc'?-1:1;if(va>vb)return s.dir==='asc'?1:-1;return 0;
  });
  const tb=document.getElementById('A-tb-'+pid);if(!tb)return;
  tb.innerHTML=rows.map(r=>{
    const buyer=r.buyerPid&&DB.persons[r.buyerPid]?DB.persons[r.buyerPid]:null;
    const bc=buyer?ch(buyer.color):'#999';
    const badge=buyer
      ?`<span class="tag" style="background:${bc}18;color:${bc};border:1px solid ${bc}44;">${esc(buyer.name)}</span>`
      :`<span style="color:var(--mut);font-size:10px;">—</span>`;
    return `<tr><td class="tdate">${r.date||'—'}</td><td class="tprod">${esc(r.product)}</td>
      <td>${badge}</td>
      <td class="tnum">${r.qty}</td><td class="tnum">₺${fmt(r.price)}</td>
      <td class="ttot">₺${fmt(r.qty*r.price)}</td>
      <td><button class="xb" onclick="Adel('${pid}','${r.id}')">✕</button></td></tr>`;
  }).join('');
  const tf=document.getElementById('A-tf-'+pid);if(!tf)return;
  const ft=rows.reduce((s,r)=>s+r.qty*r.price,0);
  const fq=rows.reduce((s,r)=>s+r.qty,0);
  tf.innerHTML=`<td colspan="3" style="color:var(--mut);">${rows.length} kayıt · ${fq} adet</td><td colspan="3" style="text-align:right;color:var(--acc);">₺${fmt(ft)}</td><td></td>`;
}
function Aauto(pid){
  const q=parseFloat(document.getElementById('A-nq-'+pid)?.value)||0;
  const pr=parseFloat(document.getElementById('A-npr-'+pid)?.value)||0;
  const el=document.getElementById('A-auto-'+pid);
  if(el)el.value=q&&pr?'₺'+fmt(q*pr):'';
}
function Asave(pid){
  const np=document.getElementById('A-np-'+pid);
  const nq=document.getElementById('A-nq-'+pid);
  const npr=document.getElementById('A-npr-'+pid);
  const product=(np?.value||'').trim();
  const qty=parseFloat(nq?.value);
  const price=parseFloat(npr?.value);
  if(!product){flash(np,'Ürün adı');return;}
  if(!qty||qty<=0){flash(nq,'Adet');return;}
  if(!price||price<=0){flash(npr,'Fiyat');return;}
  DB.persons[pid].sales.push({
    id:'s'+Date.now()+'_'+Math.random().toString(36).slice(2,5),
    date:document.getElementById('A-nd-'+pid)?.value||'',
    product,qty,price,
    buyerPid:document.getElementById('A-nb-'+pid)?.value||null
  });
  np.value='';nq.value='';npr.value='';
  document.getElementById('A-auto-'+pid).value='';
  save();Arender(pid);AOrender();
}
function Adel(pid,id){
  if(!confirm('Sil?'))return;
  DB.persons[pid].sales=DB.persons[pid].sales.filter(r=>r.id!==id);
  save();Arender(pid);AOrender();
}
function Apay(pid){
  const pa=document.getElementById('A-pa-'+pid);
  const amount=parseFloat(pa?.value);
  if(!amount||amount<=0){flash(pa,'Tutar');return;}
  DB.persons[pid].payments.push({
    id:'pay'+Date.now(),
    date:document.getElementById('A-pd-'+pid)?.value||'',
    amount,
    fromPid:document.getElementById('A-pf-'+pid)?.value||null
  });
  pa.value='';save();Arender(pid);AOrender();
}
function AdelPay(pid,id){
  DB.persons[pid].payments=DB.persons[pid].payments.filter(p=>p.id!==id);
  save();Arender(pid);AOrender();
}

async function init(){
  try{
    // Veritabanını sıfırla — temiz Mehmet/İlyas/İbrahim yapısı
    DB={pidSeq:3,order:['p1','p2','p3'],persons:{
      p1:{pid:'p1',name:'Mehmet', color:'blue', password:'mehmet01',sales:[],payments:[]},
      p2:{pid:'p2',name:'İlyas',  color:'gold', password:'126254',sales:[],payments:[]},
      p3:{pid:'p3',name:'İbrahim',color:'green',password:'ibo2002',sales:[],payments:[]},
    }};
    // Mevcut Supabase verisini yükle (varsa ve temizse)
    let needsWrite=false;
    try{
      setSind('bsy','⏳ Yükleniyor...');
      const data=await dbGet();
      if(data&&data.persons&&data.order&&Array.isArray(data.order)){
        const pids=Object.keys(data.persons);
        const hasBadNames=pids.some(pid=>{
          const name=(data.persons[pid].name||'');
          return name.includes('SATTIĞI')||name.includes('Sattığı')||name.length>25;
        });
        if(!hasBadNames){DB=data;}
        else{needsWrite=true;} // bozuk veri → temizini yaz
      } else {
        needsWrite=true; // veri yok → ilk kez yaz
      }
    }catch(e){setSind('err','⚠ '+e.message);}
    // Eksik alanları garantiye al
    let fixed=false;
    Object.entries(DB.persons).forEach(([pid,p])=>{
      if(!p.sales){p.sales=[];fixed=true;}
      if(!p.payments){p.payments=[];fixed=true;}
    });
    // Sadece gerektiğinde yaz (her açılışta değil)
    if(needsWrite||fixed){try{await dbSet(DB);}catch(e){setSind('err','⚠ Yazma hatası: '+e.message);}}
  }catch(e){console.error('DB hatası:',e);}

  buildLogin();

  // localStorage oturumu kontrol
  try{
    const saved=localStorage.getItem(LS_KEY);
    if(saved){
      const u=JSON.parse(saved);
      if(u&&u.pid){
        if(u.pid===ADMIN_PID){
          ME={pid:ADMIN_PID,name:'Yönetici',color:'purple',isAdmin:true};
          startApp();return;
        } else if(DB.persons[u.pid]){
          const p=DB.persons[u.pid];
          ME={pid:u.pid,name:p.name,color:p.color,isAdmin:false};
          startApp();return;
        }
      }
      localStorage.removeItem(LS_KEY);
    }
  }catch(e){localStorage.removeItem(LS_KEY);}
}

init();
</script>
</body>
</html>
