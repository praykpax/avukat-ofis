<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avukat Ofis Yönetimi</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f5f0;
  --surface: #ffffff;
  --surface2: #f2efe8;
  --border: #e2ddd4;
  --ink: #1c1917;
  --ink2: #78716c;
  --ink3: #a8a29e;
  --accent: #1c1917;
  --green: #166534;
  --green-bg: #dcfce7;
  --red: #991b1b;
  --red-bg: #fee2e2;
  --amber: #92400e;
  --amber-bg: #fef3c7;
  --blue: #1e40af;
  --blue-bg: #dbeafe;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);background:var(--bg);min-height:100vh}

/* HEADER */
.header{background:var(--ink);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:1px solid #333}
.header-left{display:flex;align-items:baseline;gap:10px}
.header h1{font-family:'DM Serif Display',serif;font-size:18px;font-weight:400;letter-spacing:-.2px}
.header-sub{font-size:11px;color:#9ca3af;font-style:italic}
.header-right{font-size:11px;color:#6b7280}

/* SYNC */
.sync-indicator{display:flex;align-items:center;gap:5px;font-size:11px;color:#9ca3af}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#6b7280;flex-shrink:0;transition:background .3s}
.sync-dot.ok{background:#4ade80}
.sync-dot.err{background:#f87171}
.sync-dot.syncing{background:#fbbf24;animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* SETUP BANNER */
.setup-banner{background:#1e3a5f;color:#fff;padding:11px 20px;font-size:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.setup-banner b{color:#93c5fd}
.setup-input{font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 9px;border:1px solid #334155;border-radius:5px;background:#0f2236;color:#fff;width:260px}
.setup-btn{font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 12px;border:none;border-radius:5px;background:#3b82f6;color:#fff;cursor:pointer;font-weight:600}
.setup-dismiss{font-size:11px;color:#64748b;cursor:pointer;text-decoration:underline;margin-left:4px}

/* MAIN TABS */
.main-nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;gap:0;overflow-x:auto}
.main-tab{font-size:12px;font-weight:500;padding:13px 16px;cursor:pointer;border:none;background:none;color:var(--ink2);border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;letter-spacing:.1px}
.main-tab.active{color:var(--ink);border-bottom:2px solid var(--ink);font-weight:600}
.main-tab:hover:not(.active){color:var(--ink);background:var(--surface2)}

.container{max-width:780px;margin:0 auto;padding:16px}
.section{display:none}.section.active{display:block}

/* SEARCH */
.search-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.search-row input,.search-row select{font-family:'DM Sans',sans-serif;font-size:12px;padding:8px 10px;border:1px solid var(--border);border-radius:7px;background:var(--surface);color:var(--ink)}
.search-row input{flex:1;min-width:140px}
.search-row select{min-width:130px}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden;transition:box-shadow .15s}
.card:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--ink);flex-shrink:0;border:1px solid var(--border);font-family:'DM Serif Display',serif}
.client-name{font-size:13px;font-weight:600;color:var(--ink)}
.client-sub{font-size:11px;color:var(--ink3);margin-top:1px}
.badge{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;letter-spacing:.2px}
.b-ok{background:var(--green-bg);color:var(--green)}
.b-warn{background:var(--amber-bg);color:var(--amber)}
.b-err{background:var(--red-bg);color:var(--red)}
.arrow{font-size:9px;color:var(--ink3);transition:transform .2s}
.arrow.open{transform:rotate(180deg)}
.card-body{border-top:1px solid var(--border);display:none}
.card-body.open{display:block}

/* INNER TABS */
.inner-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 10px;background:var(--surface2);overflow-x:auto}
.itab{font-size:11px;padding:8px 11px;cursor:pointer;border:none;background:none;color:var(--ink2);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;font-family:'DM Sans',sans-serif;font-weight:500}
.itab.active{color:var(--ink);font-weight:600;border-bottom:2px solid var(--ink)}
.ipane{display:none;padding:12px}
.ipane.active{display:block}

/* STATS */
.stats3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.stat{text-align:center;padding:9px 4px;background:var(--surface2);border-radius:7px;border:1px solid var(--border)}
.stat-l{font-size:10px;color:var(--ink2);text-transform:uppercase;letter-spacing:.3px}
.stat-v{font-size:12px;font-weight:600;margin-top:2px}
.pbar{width:100%;height:4px;background:var(--border);border-radius:2px;margin:6px 0 3px}
.pfill{height:100%;border-radius:2px;background:var(--green)}

/* ROWS & FORMS */
.slabel{font-size:10px;font-weight:700;color:var(--ink2);margin:10px 0 6px;text-transform:uppercase;letter-spacing:.5px}
.row-item{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:var(--surface2);border-radius:6px;margin-bottom:3px;font-size:12px;border:1px solid var(--border)}
.row-item .meta{color:var(--ink3);font-size:11px;margin-top:1px}
.row-right{display:flex;align-items:center;gap:8px}
.sm-btn{font-family:'DM Sans',sans-serif;font-size:11px;padding:6px 11px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--ink);cursor:pointer;margin-top:6px;font-weight:500;transition:background .1s}
.sm-btn:hover{background:var(--surface2)}
.del-btn{font-size:10px;padding:2px 6px;border:1px solid #fca5a5;border-radius:4px;background:#fff;color:var(--red);cursor:pointer}
.add-form{display:none;flex-direction:column;gap:6px;margin-top:8px;padding:10px;background:var(--surface2);border-radius:8px;border:1px solid var(--border)}
.add-form.open{display:flex}
.form-row{display:flex;flex-wrap:wrap;gap:6px;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:10px;color:var(--ink2);font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.fg input,.fg select{font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 8px;border:1px solid var(--border);border-radius:5px;background:var(--surface);color:var(--ink)}
.fg input[type=date]{width:135px}
.fg input[type=number]{width:120px}
.fg input[type=text]{width:140px}
.fg select{width:150px}

/* OZET */
.ozet-view{font-size:12px;line-height:1.7;color:var(--ink2);padding:10px;background:var(--surface2);border-radius:7px;min-height:50px;cursor:pointer;white-space:pre-wrap;border:1px dashed var(--border)}
.ozet-view.empty{color:var(--ink3);font-style:italic}
.ozet-edit{display:none;width:100%;font-family:'DM Sans',sans-serif;font-size:12px;line-height:1.7;padding:10px;border:1px solid var(--ink2);border-radius:7px;background:var(--surface);color:var(--ink);resize:vertical;min-height:90px}
.edit-actions{display:none;gap:6px;margin-top:6px}
.edit-actions.open{display:flex}

/* TOTAL BOX */
.total-box{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--green-bg);border-radius:6px;border:1px solid #bbf7d0;margin-top:8px;font-size:12px;font-weight:600}

/* NEW CLIENT FORM */
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:3px}
.form-group label{font-size:11px;color:var(--ink2);font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.form-group input,.form-group textarea,.form-group select{font-family:'DM Sans',sans-serif;font-size:12px;padding:8px 10px;border:1px solid var(--border);border-radius:7px;background:var(--surface);color:var(--ink)}
.form-group textarea{resize:vertical;min-height:70px;line-height:1.5}
.save-main{width:100%;font-family:'DM Sans',sans-serif;font-size:13px;padding:10px;border:none;border-radius:8px;background:var(--ink);color:#fff;cursor:pointer;font-weight:600;margin-top:6px;transition:opacity .1s}
.save-main:hover{opacity:.85}
.success{font-size:11px;color:var(--green);background:var(--green-bg);padding:7px 10px;border-radius:6px;margin-top:8px;display:none}
.empty-state{text-align:center;color:var(--ink3);font-size:12px;padding:24px;font-style:italic}

/* ======= MUHTELİF GELİRLER ======= */
.muhtgelir-cat-tag{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:600;background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe}

/* ======= GİDERLER ======= */
.gider-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.gider-header h2{font-family:'DM Serif Display',serif;font-size:16px;font-weight:400}
.month-nav{display:flex;align-items:center;gap:10px}
.month-nav button{font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);cursor:pointer}
.month-nav span{font-size:13px;font-weight:600;min-width:120px;text-align:center}
.gider-cats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px}
.gider-cat-btn{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;padding:8px 6px;border:1px solid var(--border);border-radius:7px;background:var(--surface);color:var(--ink2);cursor:pointer;text-align:center;transition:all .15s}
.gider-cat-btn.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.gider-form-area{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
.gider-list{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.gider-list-header{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border)}
.gider-list-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--ink2)}
.gider-row{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-bottom:1px solid var(--border);font-size:12px}
.gider-row:last-child{border-bottom:none}
.gider-cat-tag{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:600;background:var(--surface2);color:var(--ink2);border:1px solid var(--border)}
.gider-monthly-summary{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.gider-sum-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.gider-sum-card .label{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.3px}
.gider-sum-card .value{font-size:14px;font-weight:600;margin-top:3px}

/* ======= GENEL ÖZET (RAPOR) ======= */
@keyframes ozetRise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes barGrow{from{transform:scaleY(0)}to{transform:scaleY(1)}}

/* Hero — koyu defter kartı */
.ozet-hero{position:relative;overflow:hidden;background:var(--ink);color:#fafaf9;border-radius:16px;padding:24px 26px 22px;margin-bottom:18px;box-shadow:0 18px 40px -22px rgba(28,25,23,.7)}
.ozet-hero::before{content:"";position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.06) 1px,transparent 1px);background-size:14px 14px;opacity:.5;pointer-events:none}
.ozet-hero::after{content:"";position:absolute;top:-40%;right:-10%;width:280px;height:280px;background:radial-gradient(circle,rgba(74,222,128,.14),transparent 70%);pointer-events:none}
.hero-head{position:relative;display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.hero-head .eyebrow{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(250,250,249,.45);margin-bottom:5px}
.hero-head h2{font-family:'DM Serif Display',serif;font-size:26px;font-weight:400;line-height:1.05}
.hero-net{position:relative;text-align:right}
.hero-net .nl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(250,250,249,.45)}
.hero-net .nv{font-family:'DM Serif Display',serif;font-size:34px;line-height:1;margin-top:3px;letter-spacing:-.5px}
.hero-net .nv.pos{color:#5eead4}
.hero-net .nv.neg{color:#fca5a5}
.hero-net .nbadge{display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.hero-net .nbadge.pos{background:rgba(94,234,212,.14);color:#5eead4}
.hero-net .nbadge.neg{background:rgba(252,165,165,.14);color:#fca5a5}
.hero-grid{position:relative;display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.hero-stat{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:12px 13px}
.hero-stat .hl{font-size:9.5px;color:rgba(250,250,249,.5);text-transform:uppercase;letter-spacing:.7px}
.hero-stat .hv{font-size:17px;font-weight:600;margin-top:5px;letter-spacing:-.3px}
.hero-stat .hv.pos{color:#86efac}
.hero-stat .hv.neg{color:#fca5a5}
.hero-stat .hv.blue{color:#93c5fd}
.hero-bar{height:4px;border-radius:3px;background:rgba(255,255,255,.1);margin-top:9px;overflow:hidden}
.hero-bar i{display:block;height:100%;border-radius:3px;background:rgba(250,250,249,.55)}
.hero-bar i.pos{background:#4ade80}.hero-bar i.neg{background:#f87171}.hero-bar i.blue{background:#60a5fa}

/* Dönem sekmeleri + yıl seçici */
.ozet-period-tabs{display:flex;align-items:center;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.period-tab{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--ink2);cursor:pointer;transition:all .15s}
.period-tab:hover{border-color:var(--ink3);color:var(--ink)}
.period-tab.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.ozet-year-select{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:11px;color:var(--ink2)}
.ozet-year-select select{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;padding:7px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--ink);cursor:pointer}

#ozet-report{animation:ozetRise .35s ease both}

/* Rapor kartı + başlıklar */
.report-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:14px}
.report-card-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.report-card-head h3{font-family:'DM Serif Display',serif;font-size:18px;font-weight:400;color:var(--ink)}
.report-card-head .rc-sub{font-size:11px;color:var(--ink3);letter-spacing:.3px}
.section-title{font-family:'DM Serif Display',serif;font-size:16px;font-weight:400;margin-bottom:12px;color:var(--ink)}

/* Yarıyıl panelleri */
.half-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.half-panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden}
.half-panel::before{content:"";position:absolute;top:0;left:0;width:100%;height:3px;background:var(--ink3)}
.half-panel.h1::before{background:linear-gradient(90deg,var(--green),#4ade80)}
.half-panel.h2::before{background:linear-gradient(90deg,var(--blue),#60a5fa)}
.half-panel .hp-tag{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);font-weight:700}
.half-panel .hp-title{font-family:'DM Serif Display',serif;font-size:17px;color:var(--ink);margin:3px 0 14px}
.half-panel .hp-net{font-family:'DM Serif Display',serif;font-size:30px;line-height:1;letter-spacing:-.5px;margin-bottom:3px}
.half-panel .hp-net.pos{color:var(--green)}.half-panel .hp-net.neg{color:var(--red)}
.half-panel .hp-netlabel{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink3);margin-bottom:16px}
.hp-line{margin-bottom:11px}
.hp-line:last-child{margin-bottom:0}
.hp-line .hpl-row{display:flex;justify-content:space-between;align-items:baseline;font-size:12px;margin-bottom:4px}
.hp-line .hpl-row .lab{color:var(--ink2);display:flex;align-items:center;gap:6px}
.hp-line .hpl-row .lab i{width:8px;height:8px;border-radius:2px;display:inline-block}
.hp-line .hpl-row .val{font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums}
.hp-meter{height:6px;border-radius:4px;background:var(--surface2);overflow:hidden}
.hp-meter i{display:block;height:100%;border-radius:4px;transition:width .5s ease}
.dot-green,.hp-meter i.green{background:var(--green)}
.dot-blue,.hp-meter i.blue{background:var(--blue)}
.dot-red,.hp-meter i.red{background:var(--red)}

/* CSS Bar Chart */
.bar-chart-legend{display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap}
.bar-chart-legend .lg{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink2)}
.bar-chart-legend .lg i{width:10px;height:10px;border-radius:2px;display:inline-block}
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:200px;padding:0 2px;border-bottom:1px solid var(--border)}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:6px;min-width:0;height:100%}
.bar-stack{display:flex;align-items:flex-end;justify-content:center;gap:3px;width:100%;height:100%}
.bar{flex:1;max-width:14px;border-radius:4px 4px 0 0;min-height:2px;transform-origin:bottom;animation:barGrow .5s ease both;position:relative;cursor:default}
.bar.gelir{background:var(--green)}
.bar.muht{background:var(--blue)}
.bar.gider{background:var(--red)}
.bar:hover{filter:brightness(1.08)}
.bar:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);white-space:nowrap;background:var(--ink);color:#fff;font-size:10px;font-weight:600;padding:4px 8px;border-radius:5px;z-index:5;pointer-events:none}
.bar-x{font-size:10px;color:var(--ink3);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.bar-x b{display:block;font-size:10px;font-weight:700;margin-top:1px}
.bar-x b.pos{color:var(--green)}.bar-x b.neg{color:var(--red)}

/* Rapor tablosu + satır içi mini bar */
.report-table{width:100%;border-collapse:collapse;font-size:12px;background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.report-table th{background:var(--surface2);padding:11px 14px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink2);font-weight:700;border-bottom:1px solid var(--border)}
.report-table th.num,.report-table td.num{text-align:right;font-variant-numeric:tabular-nums}
.report-table td{padding:10px 14px;border-bottom:1px solid var(--border)}
.report-table tbody tr:hover{background:var(--surface2)}
.report-table tr:last-child td{border-bottom:none}
.report-table tfoot tr.total-row td{font-weight:700;background:var(--surface2);border-top:2px solid var(--border)}
.report-table .pos{color:var(--green)}
.report-table .neg{color:var(--red)}
.report-table .blue{color:var(--blue)}
.report-table .bold{font-weight:700;color:var(--ink)}
.rt-period{display:flex;flex-direction:column;gap:5px}
.rt-period .rtp-name{font-weight:700;color:var(--ink)}
.rt-mini{height:4px;border-radius:3px;background:var(--surface2);overflow:hidden;width:90px}
.rt-mini i{display:block;height:100%;border-radius:3px}
.rt-mini i.pos{background:var(--green)}.rt-mini i.neg{background:var(--red)}

@media(max-width:640px){
  .hero-grid{grid-template-columns:repeat(2,1fr)}
  .hero-net .nv{font-size:28px}
  .half-grid{grid-template-columns:1fr}
  .bar-chart{height:160px;gap:4px}
  .bar{max-width:10px}
  .rt-mini{width:50px}
}

/* AVUKAT ROW */
.avukat-name{font-weight:600;color:var(--ink)}
.avukat-total{font-weight:600;color:var(--green)}

/* EDIT PANEL (Müvekkil Bilgilerini Düzenle) */
.edit-client-form{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.edit-client-form .fg{display:flex;flex-direction:column;gap:3px}
.edit-client-form .fg label{font-size:10px;color:var(--ink2);font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.edit-client-form .fg input,.edit-client-form .fg textarea{font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 8px;border:1px solid var(--border);border-radius:5px;background:var(--surface);color:var(--ink)}
.edit-client-form .fg.full{grid-column:1/-1}
.danger-zone{margin-top:12px;padding:10px;border:1px solid #fca5a5;border-radius:7px;background:#fff5f5}
.danger-title{font-size:10px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.del-client-btn{font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 14px;border:1px solid var(--red);border-radius:6px;background:#fff;color:var(--red);cursor:pointer;font-weight:600}
.del-client-btn:hover{background:var(--red-bg)}

/* YEDEK BANDI */
.backup-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.backup-bar span{font-size:11px;color:var(--ink3);margin-right:4px}
.backup-btn{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;padding:6px 14px;border-radius:6px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.backup-btn.dl{background:var(--green-bg);color:var(--green);border:1px solid #bbf7d0}
.backup-btn.dl:hover{background:#bbf7d0}
.backup-btn.ul{background:var(--blue-bg);color:var(--blue);border:1px solid #bfdbfe}
.backup-btn.ul:hover{background:#bfdbfe}
.backup-msg{font-size:11px;padding:4px 10px;border-radius:5px;display:none}
.backup-msg.ok{background:var(--green-bg);color:var(--green);display:inline-block}
.backup-msg.err{background:var(--red-bg);color:var(--red);display:inline-block}

/* DANIŞMANLIK */
.dan-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.dan-ay-nav{display:flex;align-items:center;gap:10px}
.dan-ay-nav button{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;cursor:pointer;font-size:14px}
.dan-ay-label{font-size:14px;font-weight:600;min-width:120px;text-align:center}
.dan-ozet{display:flex;gap:12px;flex-wrap:wrap}
.dan-ozet-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 16px;text-align:center;min-width:100px}
.dan-ozet-box .dol{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.3px}
.dan-ozet-box .dov{font-size:15px;font-weight:700;margin-top:3px}
.dan-row{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.dan-row-left{display:flex;align-items:center;gap:10px}
.dan-badge{font-size:10px;padding:3px 8px;border-radius:4px;font-weight:600}
.dan-badge.odendi{background:var(--green-bg);color:var(--green)}
.dan-badge.bekliyor{background:var(--amber-bg);color:var(--amber)}
.dan-odendi-btn{font-size:11px;padding:5px 12px;border-radius:6px;border:1px solid var(--green);background:var(--green-bg);color:var(--green);cursor:pointer;font-weight:600}
.dan-odendi-btn:hover{background:#bbf7d0}
.dan-geri-btn{font-size:11px;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--ink2);cursor:pointer}
.dan-empty{text-align:center;padding:40px;color:var(--ink3);font-size:13px}
.dan-toggle{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.toggle-sw{position:relative;width:36px;height:20px;cursor:pointer}
.toggle-sw input{opacity:0;width:0;height:0}
.toggle-sw .sl{position:absolute;inset:0;background:#ccc;border-radius:20px;transition:.3s}
.toggle-sw .sl:before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s}
.toggle-sw input:checked+.sl{background:var(--green)}
.toggle-sw input:checked+.sl:before{transform:translateX(16px)}
.dan-tutar-input{font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 10px;border:1px solid var(--border);border-radius:6px;width:130px}
.dan-kaydet-btn{font-size:12px;padding:6px 12px;border-radius:6px;border:none;background:var(--ink);color:#fff;cursor:pointer;font-weight:600}

/* RESPONSIVE */
@media(max-width:600px){
  .form-grid{grid-template-columns:1fr}
  .stats3{grid-template-columns:1fr 1fr}
  .hero-grid{grid-template-columns:1fr 1fr}
  .gider-cats{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Avukat Ofis Yönetimi</h1>
    <span class="header-sub" id="hcount"></span>
  </div>
  <div class="header-right">
    <div class="sync-indicator">
      <span class="sync-dot" id="sync-dot"></span>
      <span id="sync-label">Yerel</span>
    </div>
    <span id="hdate"></span>
  </div>
</div>


<!-- Yedek Bandı -->
<div class="backup-bar">
  <span>Yedek:</span>
  <button class="backup-btn dl" onclick="yedekAl()">⬇ Yedek Al</button>
  <button class="backup-btn ul" onclick="document.getElementById('yedek-input').click()">⬆ Yedek Yükle</button>
  <input type="file" id="yedek-input" accept=".json" style="display:none" onchange="yedekYukle(this)">
  <span class="backup-msg" id="backup-msg"></span>
</div>

<nav class="main-nav">
  <button class="main-tab active" onclick="showMain('muvekkiller')">Müvekkiller</button>
  <button class="main-tab" onclick="showMain('danismanlik')">Danışmanlık</button>
  <button class="main-tab" onclick="showMain('giderler')">Giderler</button>
  <button class="main-tab" onclick="showMain('muhtgelirler')">Muhtelif Gelirler</button>
  <button class="main-tab" onclick="showMain('ozet')">Genel Özet</button>
  <button class="main-tab" onclick="showMain('yeni')">+ Yeni Müvekkil</button>
</nav>

<div class="container">

  <!-- ====== MÜVEKKİLLER ====== -->
  <div id="muvekkiller" class="section active">
    <div class="search-row">
      <input id="search" type="text" placeholder="İsim, TCKN, dosya no, mahkeme ara...">
      <select id="filter">
        <option value="hepsi">Tümü</option>
        <option value="bekleyen">Bakiyesi olanlar</option>
        <option value="tamam">Tamamlananlar</option>
      </select>
      <select id="sort">
        <option value="isim">Ada göre</option>
        <option value="bakiye">Bakiyeye göre</option>
        <option value="tahsilat">Tahsilata göre</option>
        <option value="anlasma">Anlaşmaya göre</option>
      </select>
      <button class="sm-btn" onclick="showSetupBanner()" title="Supabase bağlantısı" style="white-space:nowrap">☁ Bulut</button>
    </div>
    <div id="client-list"></div>
  </div>

  <!-- ====== DANIŞMANLIK ====== -->
  <div id="danismanlik" class="section">
    <div class="dan-header">
      <div class="dan-ay-nav">
        <button onclick="danAyDegis(-1)">&#8249;</button>
        <span class="dan-ay-label" id="dan-ay-label">—</span>
        <button onclick="danAyDegis(1)">&#8250;</button>
      </div>
      <div class="dan-ozet" id="dan-ozet"></div>
    </div>
    <div id="dan-list"></div>
  </div>

  <!-- ====== GİDERLER ====== -->
  <div id="giderler" class="section">
    <div class="gider-header">
      <h2 class="section-title" style="margin:0">Ofis Giderleri</h2>
      <div class="month-nav">
        <button onclick="giderAyDeg(-1)">◀</button>
        <span id="gider-ay-label"></span>
        <button onclick="giderAyDeg(1)">▶</button>
      </div>
    </div>

    <div class="gider-monthly-summary" id="gider-monthly-summary"></div>

    <div class="gider-form-area">
      <div class="slabel">Gider Ekle</div>
      <div class="form-row" style="margin-bottom:8px">
        <div class="fg">
          <label>Kategori</label>
          <select id="g-kategori">
            <option value="Kira">Kira</option>
            <option value="Elektrik/Doğalgaz/Su">Elektrik / Doğalgaz / Su</option>
            <option value="Telefon & İnternet">Telefon & İnternet</option>
            <option value="Personel & SGK">Personel & SGK</option>
            <option value="Staj & Sekreterlik">Staj & Sekreterlik</option>
            <option value="Muhtelif">Muhtelif (Diğer)</option>
          </select>
        </div>
        <div class="fg">
          <label>Tarih</label>
          <input type="date" id="g-tarih">
        </div>
        <div class="fg">
          <label>Tutar (TRY)</label>
          <input type="number" id="g-tutar" placeholder="0">
        </div>
        <div class="fg">
          <label>Açıklama</label>
          <input type="text" id="g-aciklama" placeholder="Fatura, dekont...">
        </div>
        <button class="sm-btn" style="align-self:flex-end" onclick="giderEkle()">Kaydet</button>
      </div>
    </div>

    <div class="gider-list" id="gider-list"></div>
  </div>

  <!-- ====== MUHTELİF GELİRLER ====== -->
  <div id="muhtgelirler" class="section">
    <div class="gider-header">
      <h2 class="section-title" style="margin:0">Muhtelif Gelirler</h2>
      <div class="month-nav">
        <button onclick="muhtGelirAyDeg(-1)">◀</button>
        <span id="muhtgelir-ay-label"></span>
        <button onclick="muhtGelirAyDeg(1)">▶</button>
      </div>
    </div>

    <div class="gider-monthly-summary" id="muhtgelir-monthly-summary"></div>

    <div class="gider-form-area">
      <div class="slabel">Gelir Ekle</div>
      <div class="form-row" style="margin-bottom:8px">
        <div class="fg">
          <label>Kategori</label>
          <select id="mg-kategori">
            <option value="İcra Vekalet Ücreti">İcra Vekalet Ücreti</option>
            <option value="Maktu Vekalet Ücreti">Maktu Vekalet Ücreti</option>
            <option value="Yargılama Gideri İadesi">Yargılama Gideri İadesi</option>
            <option value="Arabuluculuk Ücreti">Arabuluculuk Ücreti</option>
            <option value="Bilirkişilik Ücreti">Bilirkişilik Ücreti</option>
            <option value="Danışmanlık Ücreti">Danışmanlık Ücreti</option>
            <option value="Muhtelif (Diğer)">Muhtelif (Diğer)</option>
          </select>
        </div>
        <div class="fg">
          <label>Tarih</label>
          <input type="date" id="mg-tarih">
        </div>
        <div class="fg">
          <label>Tutar (TRY)</label>
          <input type="number" id="mg-tutar" placeholder="0">
        </div>
        <div class="fg">
          <label>Açıklama</label>
          <input type="text" id="mg-aciklama" placeholder="Karşı taraf, dava no...">
        </div>
        <button class="sm-btn" style="align-self:flex-end" onclick="muhtGelirEkle()">Kaydet</button>
      </div>
    </div>

    <div class="gider-list" id="muhtgelir-list"></div>
  </div>

  <!-- ====== GENEL ÖZET ====== -->
  <div id="ozet" class="section">
    <div class="ozet-hero" id="ozet-hero"></div>
    <div class="ozet-period-tabs">
      <button class="period-tab active" onclick="setPeriod('buyil')">Bu Yıl</button>
      <button class="period-tab" onclick="setPeriod('aylik')">Aylık</button>
      <button class="period-tab" onclick="setPeriod('yillik')">Yıllık</button>
      <span class="ozet-year-select" id="ozet-year-wrap">
        <label for="ozet-year">Yıl</label>
        <select id="ozet-year" onchange="setOzetYear(this.value)"></select>
      </span>
    </div>
    <div id="ozet-report"></div>
  </div>

  <!-- ====== YENİ MÜVEKKİL ====== -->
  <div id="yeni" class="section">
    <div class="form-card">
      <div class="form-grid">
        <div class="form-group"><label>Ad Soyad *</label><input id="n-name" type="text"></div>
        <div class="form-group"><label>TCKN</label><input id="n-tckn" type="text"></div>
        <div class="form-group"><label>Mahkeme</label><input id="n-court" type="text"></div>
        <div class="form-group"><label>Şehir / Savcılık</label><input id="n-city" type="text"></div>
        <div class="form-group"><label>Dosya No</label><input id="n-dosya" type="text"></div>
        <div class="form-group"><label>Anlaşılan Ücret (TRY) *</label><input id="n-agreed" type="number"></div>
        <div class="form-group"><label>İlk Ödeme (TRY)</label><input id="n-firstpay" type="number"></div>
        <div class="form-group"><label>İlk Ödeme Tarihi</label><input id="n-firstdate" type="date"></div>
      </div>
      <div class="form-group" style="margin-bottom:12px">
        <label>Dosya Özeti / Dava Notları</label>
        <textarea id="n-ozet" placeholder="Davanın konusu, suçlama, önemli gelişmeler..."></textarea>
      </div>
      <button class="save-main" onclick="addClient()">Kaydet</button>
      <div class="success" id="success-msg">✓ Müvekkil başarıyla eklendi!</div>
    </div>
  </div>

</div>

<script>
// ============================================================
// DATA
// ============================================================
var STORAGE_KEY    = 'avukat_data_v2';
var GIDER_KEY      = 'avukat_giderler_v2';
var MUHTGELIR_KEY  = 'avukat_muhtgelirler_v1';

var defaultClients = [
  {id:1,name:"Coşkun Hüseyin Karaoğlı",tckn:"",court:"Bakırköy CBS",city:"",dosya:"2025/122613",agreed:80000,payments:[{date:"2025-01-20",amount:16000,avukat:""}],masraflar:[],avukatPaylari:[],ozet:""},
  {id:2,name:"Mehmet Sözlü",tckn:"",court:"",city:"",dosya:"",agreed:70000,payments:[{date:"2025-03-29",amount:50000,avukat:""}],masraflar:[],avukatPaylari:[],ozet:""},
  {id:3,name:"İsmail Koç",tckn:"",court:"",city:"",dosya:"",agreed:80000,payments:[{date:"",amount:50000,avukat:""}],masraflar:[],avukatPaylari:[],ozet:""},
  {id:4,name:"Baran Kaya",tckn:"",court:"",city:"",dosya:"",agreed:30000,payments:[],masraflar:[],avukatPaylari:[],ozet:""},
  {id:5,name:"Feridun Durmuş",tckn:"",court:"",city:"",dosya:"",agreed:7000,payments:[{date:"2026-02-23",amount:7000,avukat:""}],masraflar:[],avukatPaylari:[],ozet:""},
  {id:6,name:"Noiula",tckn:"",court:"",city:"",dosya:"",agreed:7000,payments:[],masraflar:[],avukatPaylari:[],ozet:""},
  {id:7,name:"Reşit Bayırlı",tckn:"40270369810",court:"5. Ağır Ceza",city:"Denizli",dosya:"",agreed:85000,payments:[{date:"2026-02-19",amount:55000,avukat:""}],masraflar:[],avukatPaylari:[],ozet:""},
  {id:8,name:"Adem Çoltu",tckn:"44716724522",court:"Tokat Ağır Ceza",city:"",dosya:"",agreed:100000,payments:[{date:"2026-02-24",amount:50000,avukat:""}],masraflar:[],avukatPaylari:[],ozet:""},
  {id:9,name:"Bilal Özsoy",tckn:"38989361614",court:"",city:"Bakırköy",dosya:"",agreed:40000,payments:[{date:"2026-03-16",amount:40000,avukat:""}],masraflar:[],avukatPaylari:[],ozet:""},
  {id:10,name:"Özaydın Aydemir",tckn:"10792713088",court:"",city:"Bakırköy",dosya:"",agreed:550000,payments:[{date:"2026-04-15",amount:67500,avukat:""}],masraflar:[],avukatPaylari:[],ozet:""},
];

function loadData(){
  try{var s=localStorage.getItem(STORAGE_KEY);return s?JSON.parse(s):JSON.parse(JSON.stringify(defaultClients));}catch(e){return JSON.parse(JSON.stringify(defaultClients));}
}
function saveData(){localStorage.setItem(STORAGE_KEY,JSON.stringify(data));}

function loadGiderler(){
  try{var s=localStorage.getItem(GIDER_KEY);return s?JSON.parse(s):[];}catch(e){return [];}
}
function saveGiderler(){localStorage.setItem(GIDER_KEY,JSON.stringify(giderler));}

function loadMuhtGelirler(){
  try{var s=localStorage.getItem(MUHTGELIR_KEY);return s?JSON.parse(s):[];}catch(e){return [];}
}
function saveMuhtGelirler(){localStorage.setItem(MUHTGELIR_KEY,JSON.stringify(muhtGelirler));}

var data = loadData();
var giderler = loadGiderler();
var muhtGelirler = loadMuhtGelirler();

// Gider / muhtelif gelir ay state
var now = new Date();
var giderYil = now.getFullYear();
var giderAy  = now.getMonth(); // 0-based
var muhtGelirYil = now.getFullYear();
var muhtGelirAy  = now.getMonth();

var currentPeriod = 'buyil';
var ozetYil = now.getFullYear();

// ============================================================
// HELPERS
// ============================================================
function fmt(n){return Number(n||0).toLocaleString('tr-TR')+' ₺'}
function ini(name){return name.split(' ').slice(0,2).map(function(w){return w[0]||'';}).join('').toUpperCase()}
function paid(c){return (c.payments||[]).reduce(function(s,p){return s+(p.amount||0);},0)}
function bal(c){return c.agreed-paid(c)}
function pct(c){return c.agreed>0?Math.min(100,Math.round(paid(c)/c.agreed*100)):0}
function totalMasraf(c){return (c.masraflar||[]).reduce(function(s,m){return s+(m.tutar||0);},0)}
function totalAvukat(c){return (c.avukatPaylari||[]).reduce(function(s,a){return s+(a.tutar||0);},0)}

var AYLAR = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];

function ayStr(y,m){return AYLAR[m]+' '+y;}

// ============================================================
// MAIN NAV
// ============================================================
function showMain(id){
  document.querySelectorAll('.main-tab').forEach(function(t,i){
    t.classList.toggle('active',['muvekkiller','danismanlik','giderler','muhtgelirler','ozet','yeni'][i]===id);
  });
  document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active')});
  document.getElementById(id).classList.add('active');
  if(id==='muvekkiller') renderClients();
  if(id==='danismanlik') renderDanismanlik();
  if(id==='giderler'){updateGiderAyLabel();renderGiderler();}
  if(id==='muhtgelirler'){updateMuhtGelirAyLabel();renderMuhtGelirler();}
  if(id==='ozet') renderOzet();
}

// ============================================================
// MÜVEKKİLLER
// ============================================================
function showInner(i,tab){
  ['odeme','masraf','avukat','ozet','danismanlik','duzenle'].forEach(function(t){
    var it=document.getElementById('it-'+t+'-'+i);
    var ip=document.getElementById('ip-'+t+'-'+i);
    if(it) it.classList.toggle('active',t===tab);
    if(ip) ip.classList.toggle('active',t===tab);
  });
}

function renderClients(){
  var filter=document.getElementById('filter').value;
  var search=(document.getElementById('search').value||'').toLowerCase();
  var sortBy=document.getElementById('sort').value;
  var items=data.filter(function(c){
    if(filter==='bekleyen'&&bal(c)<=0) return false;
    if(filter==='tamam'&&bal(c)>0) return false;
    if(search){
      var haystack=[c.name,c.tckn,c.dosya,c.court,c.city].join(' ').toLowerCase();
      if(haystack.indexOf(search)<0) return false;
    }
    return true;
  });

  // Sıralama — danışmanlık müvekkilleri her zaman en üstte
  items=items.slice().sort(function(a,b){
    var aDan=a.danismanlik&&a.danismanlik.aktif?1:0;
    var bDan=b.danismanlik&&b.danismanlik.aktif?1:0;
    if(bDan!==aDan) return bDan-aDan;
    if(sortBy==='isim') return a.name.localeCompare(b.name,'tr');
    if(sortBy==='bakiye') return bal(b)-bal(a);
    if(sortBy==='tahsilat') return paid(b)-paid(a);
    if(sortBy==='anlasma') return b.agreed-a.agreed;
    return 0;
  });
  var done=data.filter(function(c){return bal(c)<=0;}).length;
  var totalTahsilat=data.reduce(function(s,c){return s+paid(c);},0);
  document.getElementById('hcount').textContent=data.length+' müvekkil · '+done+' tamamlandı · '+fmt(totalTahsilat)+' toplam tahsilat';

  if(!items.length){document.getElementById('client-list').innerHTML='<div class="empty-state">Müvekkil bulunamadı</div>';return;}

  document.getElementById('client-list').innerHTML=items.map(function(c){
    var i=data.indexOf(c);
    var isDan=c.danismanlik&&c.danismanlik.aktif;
    var b=bal(c);
    var badge=isDan
      ?'<span class="badge '+(danOdendi(c,new Date().getFullYear(),new Date().getMonth())?'b-ok':'b-warn')+'">Danışmanlık · '+(danOdendi(c,new Date().getFullYear(),new Date().getMonth())?'Bu Ay Ödendi':'Bekliyor')+'</span>'
      :(b<=0?'<span class="badge b-ok">Tamamlandı</span>':paid(c)===0?'<span class="badge b-err">Ödeme yok</span>':'<span class="badge b-warn">Kısmi</span>');
    var meta=[c.court,c.city,c.dosya].filter(Boolean).join(' · ')||'Detay girilmemiş';

    var pays=(c.payments||[]).length===0
      ?'<div style="font-size:11px;color:var(--ink3);font-style:italic;padding:4px 0">Henüz ödeme girilmemiş</div>'
      :(c.payments||[]).map(function(p,pi){
        var d=p.date?new Date(p.date).toLocaleDateString('tr-TR'):'—';

function tog(i){document.getElementById('bd-'+i).classList.toggle('open');document.getElementById('arr-'+i).classList.toggle('open')}
function togForm(type,i){document.getElementById('form-'+type+'-'+i).classList.toggle('open')}

function addPay(i){
  var d=document.getElementById('pd-'+i).value;
  var a=parseInt(document.getElementById('pa-'+i).value);
  var p=document.getElementById('pp-'+i).value;
  if(!a||a<=0) return;
  data[i].payments.push({date:d,amount:a,avukat:p});
  saveData(); syncToSupabase(); rerender(i,'odeme');
}
function delPay(i,pi){if(!confirm('Silinsin mi?')) return; data[i].payments.splice(pi,1); saveData(); syncToSupabase(); rerender(i,'odeme')}

function addMasraf(i){
  var d=document.getElementById('md-'+i).value;
  var t=parseInt(document.getElementById('mt-'+i).value);
  var a=document.getElementById('ma-'+i).value;
  var y=document.getElementById('my-'+i).value;
  if(!t||t<=0) return;
  data[i].masraflar.push({tarih:d,tutar:t,aciklama:a||'Masraf',yapan:y||'—'});
  saveData(); syncToSupabase(); rerender(i,'masraf');
}
function delMasraf(i,mi){if(!confirm('Silinsin mi?')) return; data[i].masraflar.splice(mi,1); saveData(); syncToSupabase(); rerender(i,'masraf')}

function addAvukat(i){
  var av=document.getElementById('av-'+i).value;
  var d=document.getElementById('avd-'+i).value;
  var t=parseInt(document.getElementById('avt-'+i).value);
  var a=document.getElementById('ava-'+i).value;
  if(!av||!t||t<=0) return;
  data[i].avukatPaylari.push({avukat:av,tarih:d,tutar:t,aciklama:a});
  saveData(); syncToSupabase(); rerender(i,'avukat');
}
function delAvukat(i,ai){if(!confirm('Silinsin mi?')) return; data[i].avukatPaylari.splice(ai,1); saveData(); syncToSupabase(); rerender(i,'avukat')}

function rerender(i,tab){
  renderClients();
  setTimeout(function(){
    document.getElementById('bd-'+i).classList.add('open');
    showInner(i,tab);
  },30);
}

function editOzet(i){
  document.getElementById('ov-'+i).style.display='none';
  document.getElementById('oe-'+i).style.display='block';
  document.getElementById('ea-'+i).classList.add('open');
  document.getElementById('oe-'+i).focus();
}
function saveOzet(i){
  var val=document.getElementById('oe-'+i).value.trim();
  data[i].ozet=val;
  saveData();
  syncToSupabase();
  var ov=document.getElementById('ov-'+i);
  ov.textContent=val||'Henüz not eklenmemiş. Düzenlemek için tıklayın.';
  ov.className='ozet-view'+(val?'':' empty');
  ov.style.display='block';
  document.getElementById('oe-'+i).style.display='none';
  document.getElementById('ea-'+i).classList.remove('open');
}
function cancelOzet(i){
  document.getElementById('oe-'+i).value=data[i].ozet||'';
  document.getElementById('ov-'+i).style.display='block';
  document.getElementById('oe-'+i).style.display='none';
  document.getElementById('ea-'+i).classList.remove('open');
}

function addClient(){
  var name=document.getElementById('n-name').value.trim();
  var agreed=parseInt(document.getElementById('n-agreed').value)||0;
  if(!name||!agreed){alert('Ad Soyad ve Anlaşılan Ücret zorunludur.');return;}
  var fp=parseInt(document.getElementById('n-firstpay').value)||0;
  var fd=document.getElementById('n-firstdate').value;
  data.push({
    id:Date.now(),name:name,
    tckn:document.getElementById('n-tckn').value,
    court:document.getElementById('n-court').value,
    city:document.getElementById('n-city').value,
    dosya:document.getElementById('n-dosya').value,
    agreed:agreed,
    payments:fp>0?[{date:fd,amount:fp,avukat:''}]:[],
    masraflar:[],avukatPaylari:[],
    ozet:document.getElementById('n-ozet').value.trim()
  });
  saveData();
  syncToSupabase();
  ['n-name','n-tckn','n-court','n-city','n-dosya','n-agreed','n-firstpay','n-firstdate','n-ozet'].forEach(function(id){document.getElementById(id).value='';});
  var msg=document.getElementById('success-msg');
  msg.style.display='block';
  setTimeout(function(){msg.style.display='none';showMain('muvekkiller');},1500);
}

// ============================================================
// GİDERLER
// ============================================================
function giderAyDeg(d){
  giderAy+=d;
  if(giderAy<0){giderAy=11;giderYil--;}
  if(giderAy>11){giderAy=0;giderYil++;}
  updateGiderAyLabel();
  renderGiderler();
}

function updateGiderAyLabel(){
  document.getElementById('gider-ay-label').textContent=ayStr(giderYil,giderAy);
}

function giderEkle(){
  var kat=document.getElementById('g-kategori').value;
  var tar=document.getElementById('g-tarih').value;
  var tut=parseInt(document.getElementById('g-tutar').value)||0;
  var ac=document.getElementById('g-aciklama').value.trim();
  if(!tut||tut<=0){alert('Tutar giriniz.');return;}
  // ay bilgisini tarihten veya aktif ay'dan al
  var yil=giderYil, ay=giderAy;
  if(tar){var d=new Date(tar);yil=d.getFullYear();ay=d.getMonth();}
  giderler.push({id:Date.now(),kategori:kat,tarih:tar,tutar:tut,aciklama:ac||kat,yil:yil,ay:ay});
  saveGiderler();
  syncToSupabase();
  document.getElementById('g-tutar').value='';
  document.getElementById('g-aciklama').value='';
  renderGiderler();
}

function delGider(id){
  if(!confirm('Silinsin mi?')) return;
  giderler=giderler.filter(function(g){return g.id!==id;});
  saveGiderler();
  syncToSupabase();
  renderGiderler();
}

function renderGiderler(){
  var ayGiderler=giderler.filter(function(g){return g.yil===giderYil&&g.ay===giderAy;});
  var toplamAy=ayGiderler.reduce(function(s,g){return s+g.tutar;},0);

  // Kategori bazlı toplam
  var katToplam={};
  ayGiderler.forEach(function(g){katToplam[g.kategori]=(katToplam[g.kategori]||0)+g.tutar;});

  // Summary
  var sumHTML='<div class="gider-sum-card"><div class="label">Bu Ay Toplam Gider</div><div class="value" style="color:var(--red)">'+fmt(toplamAy)+'</div></div>';
  sumHTML+='<div class="gider-sum-card"><div class="label">Kalem Sayısı</div><div class="value">'+ayGiderler.length+'</div></div>';
  document.getElementById('gider-monthly-summary').innerHTML=sumHTML;

  // Liste
  if(!ayGiderler.length){
    document.getElementById('gider-list').innerHTML='<div class="empty-state">Bu ay için gider girilmemiş</div>';
    return;
  }
  var rows=ayGiderler.slice().sort(function(a,b){
    return (b.tarih||'').localeCompare(a.tarih||'');
  }).map(function(g){
    var d=g.tarih?new Date(g.tarih).toLocaleDateString('tr-TR'):'—';
    return '<div class="gider-row">'
      +'<div style="display:flex;align-items:center;gap:8px">'
        +'<span class="gider-cat-tag">'+g.kategori+'</span>'
        +'<div>'
          +'<div style="font-weight:500">'+g.aciklama+'</div>'
          +'<div style="font-size:11px;color:var(--ink3)">'+d+'</div>'
        +'</div>'
      +'</div>'
      +'<div style="display:flex;align-items:center;gap:8px">'
        +'<span style="font-weight:600;color:var(--red)">'+fmt(g.tutar)+'</span>'
        +'<button class="del-btn" onclick="delGider('+g.id+')">Sil</button>'
      +'</div>'
    +'</div>';
  }).join('');

  document.getElementById('gider-list').innerHTML=
    '<div class="gider-list-header">'
      +'<span class="gider-list-title">Gider Kalemleri — '+ayStr(giderYil,giderAy)+'</span>'
      +'<span style="font-size:12px;font-weight:600;color:var(--red)">'+fmt(toplamAy)+'</span>'
    +'</div>'+rows;
}

  var ayGelirler=muhtGelirler.filter(function(g){return g.yil===muhtGelirYil&&g.ay===muhtGelirAy;});
  var toplamAy=ayGelirler.reduce(function(s,g){return s+g.tutar;},0);

  var sumHTML='<div class="gider-sum-card"><div class="label">Bu Ay Toplam Muhtelif Gelir</div><div class="value" style="color:var(--blue)">'+fmt(toplamAy)+'</div></div>';
  sumHTML+='<div class="gider-sum-card"><div class="label">Kalem Sayısı</div><div class="value">'+ayGelirler.length+'</div></div>';
  document.getElementById('muhtgelir-monthly-summary').innerHTML=sumHTML;

  if(!ayGelirler.length){
    document.getElementById('muhtgelir-list').innerHTML='<div class="empty-state">Bu ay için gelir girilmemiş</div>';
    return;
  }
  var rows=ayGelirler.slice().sort(function(a,b){
    return (b.tarih||'').localeCompare(a.tarih||'');
  }).map(function(g){
    var d=g.tarih?new Date(g.tarih).toLocaleDateString('tr-TR'):'—';
    return '<div class="gider-row">'
      +'<div style="display:flex;align-items:center;gap:8px">'
        +'<span class="muhtgelir-cat-tag">'+g.kategori+'</span>'
        +'<div>'
          +'<div style="font-weight:500">'+g.aciklama+'</div>'
          +'<div style="font-size:11px;color:var(--ink3)">'+d+'</div>'
        +'</div>'
      +'</div>'
      +'<div style="display:flex;align-items:center;gap:8px">'
        +'<span style="font-weight:600;color:var(--blue)">'+fmt(g.tutar)+'</span>'
        +'<button class="del-btn" onclick="delMuhtGelir('+g.id+')">Sil</button>'
      +'</div>'
    +'</div>';
  }).join('');

  document.getElementById('muhtgelir-list').innerHTML=
    '<div class="gider-list-header">'
      +'<span class="gider-list-title">Gelir Kalemleri — '+ayStr(muhtGelirYil,muhtGelirAy)+'</span>'
      +'<span style="font-size:12px;font-weight:600;color:var(--blue)">'+fmt(toplamAy)+'</span>'
    +'</div>'+rows;
}

// ============================================================
// GENEL ÖZET
// ============================================================
function setPeriod(p){
  currentPeriod=p;
  var order=['buyil','aylik','yillik'];
  document.querySelectorAll('.period-tab').forEach(function(t,i){
    t.classList.toggle('active',order[i]===p);
  });
  document.getElementById('ozet-year-wrap').style.display = (p==='buyil') ? 'flex' : 'none';
  renderOzet();
}

function setOzetYear(v){
  ozetYil=parseInt(v,10);
  renderOzet();
}

function ozetYilSecenekleri(){
  var yillar={};
  yillar[now.getFullYear()]=true;
  data.forEach(function(c){(c.payments||[]).forEach(function(p){if(p.date)yillar[new Date(p.date).getFullYear()]=true;});});
  giderler.forEach(function(g){if(g.yil)yillar[g.yil]=true;});
  muhtGelirler.forEach(function(g){if(g.yil)yillar[g.yil]=true;});
  return Object.keys(yillar).map(Number).sort(function(a,b){return b-a;});
}

function barStack(gelir,muht,gider,maxV){
  function h(v){return maxV>0?Math.max(v>0?2:0,Math.round(v/maxV*100)):0;}
  return '<span class="bar gelir" style="height:'+h(gelir)+'%" data-tip="Tahsilat '+fmt(gelir)+'"></span>'
       + '<span class="bar muht" style="height:'+h(muht)+'%" data-tip="Muhtelif '+fmt(muht)+'"></span>'
       + '<span class="bar gider" style="height:'+h(gider)+'%" data-tip="Gider '+fmt(gider)+'"></span>';
}

function barChart(rows){
  var maxV=rows.reduce(function(m,r){return Math.max(m,r.gelir,r.muht,r.gider);},0);
  var cols=rows.map(function(r){
    return '<div class="bar-col">'
      +'<div class="bar-stack">'+barStack(r.gelir,r.muht,r.gider,maxV)+'</div>'
      +'<div class="bar-x">'+r.kisa+'<b class="'+(r.net>=0?'pos':'neg')+'">'+(r.net>=0?'+':'')+kisaltTutar(r.net)+'</b></div>'
    +'</div>';
  }).join('');
  return '<div class="bar-chart-legend">'
      +'<span class="lg"><i style="background:var(--green)"></i>Tahsilat</span>'
      +'<span class="lg"><i style="background:var(--blue)"></i>Muhtelif Gelir</span>'
      +'<span class="lg"><i style="background:var(--red)"></i>Gider</span>'
    +'</div>'
    +'<div class="bar-chart">'+cols+'</div>';
}

function kisaltTutar(n){
  var a=Math.abs(n), s=n<0?'-':'';
  if(a>=1000000) return s+(a/1000000).toLocaleString('tr-TR',{maximumFractionDigits:1})+'M';
  if(a>=1000)    return s+Math.round(a/1000)+'B';
  return s+a;
}

function aylikRows(y){
  var rows=[];
  for(var m=0;m<12;m++){
    var gel=gelirForMonth(y,m), muht=muhtGelirForMonth(y,m), gid=giderForMonth(y,m);
    rows.push({label:ayStr(y,m),kisa:AYLAR[m].slice(0,3),gelir:gel,muht:muht,gider:gid,net:gel+muht-gid});
  }
  return rows;
}

function yariyilTopla(y,baslangic){
  var gel=0,muht=0,gid=0;
  for(var m=baslangic;m<baslangic+6;m++){gel+=gelirForMonth(y,m);muht+=muhtGelirForMonth(y,m);gid+=giderForMonth(y,m);}
  return {gelir:gel,muht:muht,gider:gid,net:gel+muht-gid};
}

function yariyilPanel(cls,tag,title,d){
  var pozGelir=d.gelir+d.muht;
  var maxKalem=Math.max(d.gelir,d.muht,d.gider,1);
  function meter(v,renk){return '<div class="hp-meter"><i class="'+renk+'" style="width:'+Math.round(v/maxKalem*100)+'%"></i></div>';}
  return '<div class="half-panel '+cls+'">'
    +'<div class="hp-tag">'+tag+'</div>'
    +'<div class="hp-title">'+title+'</div>'
    +'<div class="hp-net '+(d.net>=0?'pos':'neg')+'">'+fmt(d.net)+'</div>'
    +'<div class="hp-netlabel">Net Kar / Zarar</div>'
    +'<div class="hp-line"><div class="hpl-row"><span class="lab"><i class="dot-green"></i>Tahsilat</span><span class="val">'+fmt(d.gelir)+'</span></div>'+meter(d.gelir,'green')+'</div>'
    +'<div class="hp-line"><div class="hpl-row"><span class="lab"><i class="dot-blue"></i>Muhtelif Gelir</span><span class="val">'+fmt(d.muht)+'</span></div>'+meter(d.muht,'blue')+'</div>'
    +'<div class="hp-line"><div class="hpl-row"><span class="lab"><i class="dot-red"></i>Gider</span><span class="val">'+fmt(d.gider)+'</span></div>'+meter(d.gider,'red')+'</div>'
  +'</div>';
}

// Belirli yıl/ay için müvekkil tahsilatı
function gelirForMonth(y,m){
  return data.reduce(function(s,c){
    return s+(c.payments||[]).reduce(function(s2,p){
      if(!p.date) return s2;
      var d=new Date(p.date);
      return d.getFullYear()===y&&d.getMonth()===m?s2+(p.amount||0):s2;
    },0);
  },0);
}

function giderForMonth(y,m){
  return giderler.filter(function(g){return g.yil===y&&g.ay===m;})
    .reduce(function(s,g){return s+g.tutar;},0);
}

function muhtGelirForMonth(y,m){
  return muhtGelirler.filter(function(g){return g.yil===y&&g.ay===m;})
    .reduce(function(s,g){return s+g.tutar;},0);
}

function renderOzet(){
  var nowY=now.getFullYear(), nowM=now.getMonth();

  // Yıl seçici doldur
  var yillar=ozetYilSecenekleri();
  if(yillar.indexOf(ozetYil)===-1) ozetYil=yillar[0]||nowY;
  var sel=document.getElementById('ozet-year');
  if(sel){
    sel.innerHTML=yillar.map(function(y){return '<option value="'+y+'"'+(y===ozetYil?' selected':'')+'>'+y+'</option>';}).join('');
  }
  document.getElementById('ozet-year-wrap').style.display=(currentPeriod==='buyil')?'flex':'none';

  // ===== HERO: tüm zamanlar =====
  var toplamTahsilat=data.reduce(function(s,c){return s+paid(c);},0);
  var toplamMuhtGelir=muhtGelirler.reduce(function(s,g){return s+g.tutar;},0);
  var toplamGelir=toplamTahsilat+toplamMuhtGelir;
  var toplamGider=giderler.reduce(function(s,g){return s+g.tutar;},0);
  var netKar=toplamGelir-toplamGider;
  var toplamAnlasman=data.reduce(function(s,c){return s+c.agreed;},0);
  var toplamBakiye=toplamAnlasman-toplamTahsilat;
  var giderOran=toplamGelir>0?Math.min(100,Math.round(toplamGider/toplamGelir*100)):0;
  var tahsilOran=toplamAnlasman>0?Math.round(toplamTahsilat/toplamAnlasman*100):0;
  var muhtOran=toplamGelir>0?Math.round(toplamMuhtGelir/toplamGelir*100):0;
  var bakiyeOran=toplamAnlasman>0?Math.round(toplamBakiye/toplamAnlasman*100):0;

  document.getElementById('ozet-hero').innerHTML=
    '<div class="hero-head">'
      +'<div><div class="eyebrow">Avukatlık Ofisi · Mali Rapor</div><h2>Genel Finansal Özet</h2></div>'
      +'<div class="hero-net">'
        +'<div class="nl">Net Kar / Zarar (Tüm Zamanlar)</div>'
        +'<div class="nv '+(netKar>=0?'pos':'neg')+'">'+fmt(netKar)+'</div>'
        +'<div class="nbadge '+(netKar>=0?'pos':'neg')+'">'+(netKar>=0?'▲ Kâr':'▼ Zarar')+' · Gider/Gelir %'+giderOran+'</div>'
      +'</div>'
    +'</div>'
    +'<div class="hero-grid">'
      +'<div class="hero-stat"><div class="hl">Toplam Tahsilat</div><div class="hv pos">'+fmt(toplamTahsilat)+'</div><div class="hero-bar"><i class="pos" style="width:'+tahsilOran+'%"></i></div></div>'
      +'<div class="hero-stat"><div class="hl">Muhtelif Gelir</div><div class="hv blue">'+fmt(toplamMuhtGelir)+'</div><div class="hero-bar"><i class="blue" style="width:'+muhtOran+'%"></i></div></div>'
      +'<div class="hero-stat"><div class="hl">Toplam Gider</div><div class="hv neg">'+fmt(toplamGider)+'</div><div class="hero-bar"><i class="neg" style="width:'+giderOran+'%"></i></div></div>'
      +'<div class="hero-stat"><div class="hl">Tahsil Edilmemiş</div><div class="hv neg">'+fmt(toplamBakiye)+'</div><div class="hero-bar"><i class="neg" style="width:'+bakiyeOran+'%"></i></div></div>'
    +'</div>';

  // ===== RAPOR =====
  if(currentPeriod==='buyil') renderBuYil();
  else if(currentPeriod==='aylik') renderAylik();
  else renderYillik();
}

function renderBuYil(){
  var y=ozetYil;
  var ilk=yariyilTopla(y,0);
  var ikinci=yariyilTopla(y,6);
  var yilNet=ilk.net+ikinci.net;
  var rows=aylikRows(y);

  document.getElementById('ozet-report').innerHTML=
    '<div class="half-grid">'
      +yariyilPanel('h1','I. Yarıyıl',(y)+' · Ocak – Haziran',ilk)
      +yariyilPanel('h2','II. Yarıyıl',(y)+' · Temmuz – Aralık',ikinci)
    +'</div>'
    +'<div class="report-card">'
      +'<div class="report-card-head"><h3>'+y+' Aylık Dağılım</h3><span class="rc-sub">Yıl Net: '+fmt(yilNet)+'</span></div>'
      +barChart(rows)
    +'</div>';
}

function renderAylik(){
  var nowY=now.getFullYear(), nowM=now.getMonth();
  var rows=[];
  for(var k=11;k>=0;k--){
    var d=new Date(nowY,nowM-k,1), yy=d.getFullYear(), mm=d.getMonth();
    var gel=gelirForMonth(yy,mm), muht=muhtGelirForMonth(yy,mm), gid=giderForMonth(yy,mm);
    rows.push({label:ayStr(yy,mm),kisa:AYLAR[mm].slice(0,3),gelir:gel,muht:muht,gider:gid,net:gel+muht-gid});
  }
  var rowsDesc=rows.slice().reverse();
  document.getElementById('ozet-report').innerHTML=
    '<div class="report-card">'
      +'<div class="report-card-head"><h3>Son 12 Ay</h3><span class="rc-sub">Aylık gelir-gider seyri</span></div>'
      +barChart(rows)
    +'</div>'
    +raporTablosu('Ay',rowsDesc);
}

function renderYillik(){
  var nowY=now.getFullYear();
  var rows=[];
  for(var yr=nowY;yr>=nowY-4;yr--){
    var gel=0,muht=0,gid=0;
    for(var mm=0;mm<12;mm++){gel+=gelirForMonth(yr,mm);muht+=muhtGelirForMonth(yr,mm);gid+=giderForMonth(yr,mm);}
    rows.push({label:yr+' Yılı',kisa:''+yr,gelir:gel,muht:muht,gider:gid,net:gel+muht-gid});
  }
  document.getElementById('ozet-report').innerHTML=
    '<div class="report-card">'
      +'<div class="report-card-head"><h3>Son 5 Yıl</h3><span class="rc-sub">Yıllık karşılaştırma</span></div>'
      +barChart(rows)
    +'</div>'
    +raporTablosu('Yıl',rows);
}

function raporTablosu(baslik,rows){
  var totalGel=rows.reduce(function(s,r){return s+r.gelir;},0);
  var totalMuht=rows.reduce(function(s,r){return s+r.muht;},0);
  var totalGid=rows.reduce(function(s,r){return s+r.gider;},0);
  var totalNet=totalGel+totalMuht-totalGid;
  var maxAbsNet=rows.reduce(function(m,r){return Math.max(m,Math.abs(r.net));},0)||1;

  var tableRows=rows.map(function(r){
    var w=Math.round(Math.abs(r.net)/maxAbsNet*100);
    return '<tr>'
      +'<td><div class="rt-period"><span class="rtp-name">'+r.label+'</span>'
        +'<span class="rt-mini"><i class="'+(r.net>=0?'pos':'neg')+'" style="width:'+w+'%"></i></span></div></td>'
      +'<td class="num pos">'+fmt(r.gelir)+'</td>'
      +'<td class="num blue">'+fmt(r.muht)+'</td>'
      +'<td class="num neg">'+fmt(r.gider)+'</td>'
      +'<td class="num bold '+(r.net>=0?'pos':'neg')+'">'+fmt(r.net)+'</td>'
    +'</tr>';
  }).join('');

  return '<table class="report-table">'
      +'<thead><tr><th>'+baslik+'</th><th class="num">Tahsilat</th><th class="num">Muht. Gelir</th><th class="num">Gider</th><th class="num">Net Kar/Zarar</th></tr></thead>'
      +'<tbody>'+tableRows+'</tbody>'
      +'<tfoot><tr class="total-row">'
        +'<td>TOPLAM</td>'
        +'<td class="num pos">'+fmt(totalGel)+'</td>'
        +'<td class="num blue">'+fmt(totalMuht)+'</td>'
        +'<td class="num neg">'+fmt(totalGid)+'</td>'
        +'<td class="num '+(totalNet>=0?'pos':'neg')+'">'+fmt(totalNet)+'</td>'
      +'</tr></tfoot>'
    +'</table>';
}

function escHtml(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function saveClientEdit(i){
  var name=document.getElementById('ec-name-'+i).value.trim();
  var agreed=parseInt(document.getElementById('ec-agreed-'+i).value)||0;
  if(!name){alert('Ad Soyad boş bırakılamaz.');return;}
  data[i].name   = name;
  data[i].tckn   = document.getElementById('ec-tckn-'+i).value.trim();
  data[i].court  = document.getElementById('ec-court-'+i).value.trim();
  data[i].city   = document.getElementById('ec-city-'+i).value.trim();
  data[i].dosya  = document.getElementById('ec-dosya-'+i).value.trim();
  data[i].agreed = agreed;
  saveData();
  syncToSupabase();
  rerender(i,'duzenle');
}

function deleteClient(i){
  if(!confirm('"'+data[i].name+'" silinsin mi? Bu işlem geri alınamaz.')) return;
  data.splice(i,1);
  saveData();
  syncToSupabase();
  renderClients();
}

// DANIŞMANLIK
// ============================================================
var danAy=new Date().getMonth();
var danYil=new Date().getFullYear();
var AYLAR=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];

function danAyDegis(d){
  danAy+=d;
  if(danAy<0){danAy=11;danYil--;}
  if(danAy>11){danAy=0;danYil++;}
  renderDanismanlik();
}

function renderDanismanlik(){
  document.getElementById('dan-ay-label').textContent=AYLAR[danAy]+' '+danYil;
  var aktifler=data.filter(function(c){return c.danismanlik&&c.danismanlik.aktif;});
  var toplam=aktifler.reduce(function(s,c){return s+(c.danismanlik.tutar||0);},0);
  var odenenler=aktifler.filter(function(c){return danOdendi(c,danYil,danAy);});
  var tahsil=odenenler.reduce(function(s,c){return s+(c.danismanlik.tutar||0);},0);
  document.getElementById('dan-ozet').innerHTML=
    '<div class="dan-ozet-box"><div class="dol">Beklenen</div><div class="dov">'+fmt(toplam)+'</div></div>'+
    '<div class="dan-ozet-box"><div class="dol">Tahsil</div><div class="dov" style="color:var(--green)">'+fmt(tahsil)+'</div></div>'+
    '<div class="dan-ozet-box"><div class="dol">Bekleyen</div><div class="dov" style="color:var(--amber)">'+fmt(toplam-tahsil)+'</div></div>'+
    '<div class="dan-ozet-box"><div class="dol">Müvekkil</div><div class="dov">'+aktifler.length+'</div></div>';
  if(!aktifler.length){
    document.getElementById('dan-list').innerHTML='<div class="dan-empty">Henüz danışmanlık müvekkili yok.<br>Müvekkil kartından "Danışmanlık" sekmesini açarak ekleyebilirsiniz.</div>';
    return;
  }
  document.getElementById('dan-list').innerHTML=aktifler.map(function(c){
    var i=data.indexOf(c);
    var odendi=danOdendi(c,danYil,danAy);
    return '<div class="dan-row">'
      +'<div class="dan-row-left">'
        +'<div class="avatar">'+ini(c.name)+'</div>'
        +'<div><div style="font-weight:600;font-size:13px">'+c.name+'</div>'
        +'<div style="font-size:11px;color:var(--ink3)">'+fmt(c.danismanlik.tutar||0)+' / ay</div></div>'
      +'</div>'
      +'<div style="display:flex;align-items:center;gap:8px">'
        +'<span class="dan-badge '+(odendi?'odendi':'bekliyor')+'">'+(odendi?'Ödendi':'Bekliyor')+'</span>'
        +(odendi
          ?'<button class="dan-geri-btn" onclick="danMarkGeri('+i+')">Geri al</button>'
          :'<button class="dan-odendi-btn" onclick="danMarkOdendi('+i+')">✓ Ödendi</button>')
      +'</div>'
    +'</div>';
  }).join('');
}

function danOdendi(c,yil,ay){
  // Danışmanlık sekmesinden işaretlenenler
  if(c.danismanlik&&c.danismanlik.odemeler){
    if(c.danismanlik.odemeler.some(function(o){return o.yil===yil&&o.ay===ay&&o.odendi;})) return true;
  }
  // Ödeme sekmesinden o ay girilen ödemeler
  if(c.payments&&c.payments.length){
    return c.payments.some(function(p){
      if(!p.date) return false;
      var d=new Date(p.date);
      return d.getFullYear()===yil&&d.getMonth()===ay;
    });
  }
  return false;
}

function danMarkOdendi(i){
  if(!data[i].danismanlik.odemeler) data[i].danismanlik.odemeler=[];
  var mevcut=data[i].danismanlik.odemeler.find(function(o){return o.yil===danYil&&o.ay===danAy;});
  if(mevcut){mevcut.odendi=true;mevcut.tarih=new Date().toISOString().split('T')[0];}
  else data[i].danismanlik.odemeler.push({yil:danYil,ay:danAy,odendi:true,tarih:new Date().toISOString().split('T')[0]});
  saveData();syncToSupabase();renderDanismanlik();renderClients();
}

function danMarkGeri(i){
  if(!data[i].danismanlik.odemeler) return;
  var mevcut=data[i].danismanlik.odemeler.find(function(o){return o.yil===danYil&&o.ay===danAy;});
  if(mevcut) mevcut.odendi=false;
  saveData();syncToSupabase();renderDanismanlik();renderClients();
}

function toggleDanismanlik(i){
  var aktif=document.getElementById('dan-tog-'+i).checked;
  if(!data[i].danismanlik) data[i].danismanlik={aktif:false,tutar:0,odemeler:[]};
  data[i].danismanlik.aktif=aktif;
  // İlk açılışta anlaşılan ücreti varsayılan tutar yap
  if(aktif&&!data[i].danismanlik.tutar){
    data[i].danismanlik.tutar=data[i].agreed||0;
    var inp=document.getElementById('dan-tutar-'+i);
    if(inp) inp.value=data[i].danismanlik.tutar;
  }
  document.getElementById('dan-form-'+i).style.display=aktif?'block':'none';
  saveData();syncToSupabase();
}

function saveDanismanlikTutar(i){
  var tutar=parseInt(document.getElementById('dan-tutar-'+i).value)||0;
  if(!data[i].danismanlik) data[i].danismanlik={aktif:true,tutar:0,odemeler:[]};
  data[i].danismanlik.tutar=tutar;
  saveData();syncToSupabase();
  var btn=document.getElementById('dan-tutar-'+i).nextElementSibling;
  btn.textContent='✓ Kaydedildi';
  setTimeout(function(){btn.textContent='Kaydet';},1500);
}

function danismanlikGecmis(i){
  var c=data[i];
  if(!c.danismanlik||!c.danismanlik.odemeler||!c.danismanlik.odemeler.length)
    return '<div style="font-size:11px;color:var(--ink3);font-style:italic">Henüz ödeme kaydı yok</div>';
  return c.danismanlik.odemeler.filter(function(o){return o.odendi;}).sort(function(a,b){return b.yil-a.yil||b.ay-a.ay;}).map(function(o){
    return '<div class="row-item"><div>'+AYLAR[o.ay]+' '+o.yil+'</div><div class="row-right"><span class="dan-badge odendi">Ödendi</span><span style="font-size:11px;color:var(--ink3);margin-left:6px">'+(o.tarih||'')+'</span></div></div>';
  }).join('');
}

var GAS_URL='https://script.google.com/macros/s/AKfycbxWGtv9z69zEuAdqtdqaQWxA0VRKU5b28SEA2rRh-bj_iKyQ-oPSX6xbTLcN7tmsndpNQ/exec';

function setSyncStatus(state,label){
  var dot=document.getElementById('sync-dot');
  var lbl=document.getElementById('sync-label');
  dot.className='sync-dot'+(state?' '+state:'');
  lbl.textContent=label||'';
}

function initSupabase(){
  setSyncStatus('syncing','Yükleniyor...');
  loadFromSupabase();
}

async function loadFromSupabase(){
  try{
    var r=await fetch(GAS_URL+'?type=avukat');
    var remote=await r.json();
    if(remote&&remote.clients){
      data=remote.clients;
      giderler=remote.giderler||giderler;
      muhtGelirler=remote.muhtGelirler||muhtGelirler;
      saveData();saveGiderler();saveMuhtGelirler();
      renderClients();
      renderGiderler();
    } else {
      await pushToSupabase();
    }
    setSyncStatus('ok','Senkron ✓');
  }catch(e){
    setSyncStatus('err','Hata');
    console.error('GAS load error:',e);
  }
}

async function pushToSupabase(){
  setSyncStatus('syncing','Kaydediliyor...');
  try{
    await fetch(GAS_URL+'?type=avukat',{
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({clients:data,giderler:giderler,muhtGelirler:muhtGelirler})
    });
    setSyncStatus('ok','Senkron ✓');
  }catch(e){
    setSyncStatus('err','Hata: '+e.message);
    console.error('GAS push error:',e);
  }
}

var _syncTimer=null;
function syncToSupabase(){
  clearTimeout(_syncTimer);
  setSyncStatus('syncing','Kaydediliyor...');
  _syncTimer=setTimeout(function(){pushToSupabase();},1500);
}

// Orijinal saveData'yı wrap et
var _origSaveData=saveData;
saveData=function(){_origSaveData();};
var _origSaveGiderler=saveGiderler;
saveGiderler=function(){_origSaveGiderler();};
var _origSaveMuhtGelirler=saveMuhtGelirler;
saveMuhtGelirler=function(){_origSaveMuhtGelirler();};

// ============================================================
// YEDEK AL / YÜKLE
// ============================================================
function yedekAl(){
  var payload={
    versiyon: 3,
    tarih: new Date().toISOString(),
    clients: data,
    giderler: giderler,
    muhtGelirler: muhtGelirler
  };
  var json=JSON.stringify(payload, null, 2);
  var blob=new Blob([json],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  var tarihStr=new Date().toLocaleDateString('tr-TR').replace(/\./g,'-');
  a.href=url;
  a.download='avukat-yedek-'+tarihStr+'.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showBackupMsg('✓ Yedek indirildi','ok');
}

function yedekYukle(input){
  var file=input.files[0];
  if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var payload=JSON.parse(e.target.result);
      // Eski format (düz dizi) veya yeni format (obje) destekle
      if(Array.isArray(payload)){
        data=payload;
        giderler=[];
        muhtGelirler=[];
      } else {
        if(!payload.clients||!Array.isArray(payload.clients)) throw new Error('Geçersiz format');
        data=payload.clients;
        giderler=payload.giderler||[];
        muhtGelirler=payload.muhtGelirler||[];
      }
      saveData();
      saveGiderler();
      saveMuhtGelirler();
      syncToSupabase();
      renderClients();
      showBackupMsg('✓ Yedek yüklendi — '+data.length+' müvekkil','ok');
    }catch(err){
      showBackupMsg('✗ Hata: '+err.message,'err');
    }
    input.value=''; // aynı dosyayı tekrar seçebilmek için sıfırla
  };
  reader.readAsText(file);
}

function showBackupMsg(text,type){
  var el=document.getElementById('backup-msg');
  el.textContent=text;
  el.className='backup-msg '+type;
  setTimeout(function(){el.className='backup-msg';},3000);
}

document.getElementById('g-tarih').valueAsDate=new Date();
document.getElementById('mg-tarih').valueAsDate=new Date();
document.getElementById('hdate').textContent=new Date().toLocaleDateString('tr-TR',{day:'numeric',month:'long',year:'numeric'});

updateGiderAyLabel();
updateMuhtGelirAyLabel();
renderClients();
initSupabase();
