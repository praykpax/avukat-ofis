<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; font-size: 13px; color: #1a1a1a; background: #fff; }

  .tabs { display: flex; border-bottom: 1px solid #e5e7eb; margin-bottom: 12px; }
  .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-size: 12px; color: #6b7280; border-bottom: 2px solid transparent; background: none; border-top: none; border-left: none; border-right: none; }
  .tab.active { color: #111; font-weight: bold; border-bottom: 2px solid #111; }

  .section { display: none; padding: 0 10px 10px; }
  .section.active { display: block; }

  .search-row { display: flex; gap: 6px; margin-bottom: 10px; }
  .search-row input, .search-row select { font-size: 12px; padding: 6px 8px; border: 1px solid #d1d5db; border-radius: 6px; background: #fff; color: #111; }
  .search-row input { flex: 1; }

  .card { border: 1px solid #e5e7eb; border-radius: 8px; margin-bottom: 8px; overflow: hidden; }
  .card-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; cursor: pointer; background: #fff; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: #dbeafe; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: #1d4ed8; flex-shrink: 0; }
  .client-name { font-size: 12px; font-weight: bold; color: #111; }
  .client-sub { font-size: 10px; color: #6b7280; margin-top: 1px; }
  .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
  .b-ok { background: #d1fae5; color: #065f46; }
  .b-warn { background: #fef3c7; color: #92400e; }
  .b-err { background: #fee2e2; color: #991b1b; }
  .arrow { font-size: 10px; color: #9ca3af; transition: transform .2s; }
  .arrow.open { transform: rotate(180deg); }

  .card-body { border-top: 1px solid #e5e7eb; display: none; }
  .card-body.open { display: block; }

  .inner-tabs { display: flex; border-bottom: 1px solid #e5e7eb; padding: 0 10px; background: #f9fafb; }
  .itab { font-size: 11px; padding: 7px 10px; cursor: pointer; border: none; background: none; color: #6b7280; border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .itab.active { color: #111; font-weight: bold; border-bottom: 2px solid #111; }

  .ipane { display: none; padding: 12px; }
  .ipane.active { display: block; }

  .stats3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
  .stat { text-align: center; padding: 8px 4px; background: #f3f4f6; border-radius: 6px; }
  .stat-l { font-size: 10px; color: #6b7280; }
  .stat-v { font-size: 12px; font-weight: bold; margin-top: 2px; }

  .pbar { width: 100%; height: 4px; background: #e5e7eb; border-radius: 2px; margin: 6px 0 3px; }
  .pfill { height: 100%; border-radius: 2px; background: #10b981; }

  .slabel { font-size: 10px; font-weight: bold; color: #6b7280; margin: 10px 0 6px; text-transform: uppercase; letter-spacing: .3px; }

  .pay-row { display: flex; justify-content: space-between; padding: 5px 8px; background: #f9fafb; border-radius: 5px; margin-bottom: 3px; font-size: 11px; }
  .sm-btn { font-size: 11px; padding: 5px 10px; border: 1px solid #d1d5db; border-radius: 5px; background: #fff; color: #374151; cursor: pointer; margin-top: 6px; }

  .add-form { display: none; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
  .add-form.open { display: flex; }
  .add-form input { font-size: 11px; padding: 5px 8px; border: 1px solid #d1d5db; border-radius: 5px; background: #fff; color: #111; width: 130px; }
  .add-form input[type=number] { width: 120px; }

  .ozet-view { font-size: 12px; line-height: 1.6; color: #374151; padding: 10px; background: #f9fafb; border-radius: 6px; min-height: 50px; cursor: pointer; white-space: pre-wrap; }
  .ozet-view.empty { color: #9ca3af; font-style: italic; }
  .ozet-edit { display: none; width: 100%; font-size: 12px; line-height: 1.6; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; background: #fff; color: #111; resize: vertical; min-height: 90px; font-family: Arial, sans-serif; }
  .edit-actions { display: none; gap: 5px; margin-top: 6px; }
  .edit-actions.open { display: flex; }

  .form-section { background: #fff; padding: 10px; }
  .form-group { display: flex; flex-direction: column; gap: 3px; margin-bottom: 10px; }
  .form-group label { font-size: 11px; color: #6b7280; font-weight: bold; }
  .form-group input, .form-group textarea { font-size: 12px; padding: 7px 9px; border: 1px solid #d1d5db; border-radius: 6px; background: #fff; color: #111; font-family: Arial, sans-serif; }
  .form-group textarea { resize: vertical; min-height: 70px; line-height: 1.5; }
  .form-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .save-main { width: 100%; font-size: 13px; padding: 9px; border: 1px solid #374151; border-radius: 6px; background: #111; color: #fff; cursor: pointer; font-weight: bold; margin-top: 4px; }

  .loading { text-align: center; color: #9ca3af; font-size: 12px; padding: 20px; }
  .success { font-size: 11px; color: #065f46; background: #d1fae5; padding: 6px 10px; border-radius: 5px; margin-top: 8px; display: none; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #e5e7eb; border-top-color: #374151; border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="tabs">
  <button class="tab active" onclick="showTab('muvekkiller')">Müvekkiller</button>
  <button class="tab" onclick="showTab('yeni')">+ Yeni</button>
</div>

<div id="muvekkiller" class="section active">
  <div class="search-row">
    <input id="search" type="text" placeholder="Ara...">
    <select id="filter">
      <option value="hepsi">Tümü</option>
      <option value="bekleyen">Bakiyesi olanlar</option>
      <option value="tamam">Tamamlananlar</option>
    </select>
  </div>
  <div id="client-list"><div class="loading"><div class="spinner"></div></div></div>
</div>

<div id="yeni" class="section">
  <div class="form-section">
    <div class="form-2col">
      <div class="form-group"><label>Ad Soyad *</label><input id="n-name" type="text"></div>
      <div class="form-group"><label>TCKN</label><input id="n-tckn" type="text"></div>
      <div class="form-group"><label>Mahkeme</label><input id="n-court" type="text"></div>
      <div class="form-group"><label>Şehir / Savcılık</label><input id="n-city" type="text"></div>
      <div class="form-group"><label>Dosya No</label><input id="n-dosya" type="text"></div>
      <div class="form-group"><label>Anlaşılan Ücret *</label><input id="n-agreed" type="number"></div>
      <div class="form-group"><label>İlk Ödeme (TRY)</label><input id="n-firstpay" type="number"></div>
      <div class="form-group"><label>İlk Ödeme Tarihi</label><input id="n-firstdate" type="date"></div>
    </div>
    <div class="form-group">
      <label>Dosya Özeti / Dava Notları</label>
      <textarea id="n-ozet" placeholder="Davanın konusu, suçlama, önemli gelişmeler..."></textarea>
    </div>
    <button class="save-main" onclick="addClient()">Kaydet</button>
    <div class="success" id="success-msg">Müvekkil başarıyla eklendi!</div>
  </div>
</div>

<script>
var allData = [];

function fmt(n) { return Number(n).toLocaleString('tr-TR') + ' TRY'; }
function ini(name) { return name.split(' ').slice(0,2).map(function(w){return w[0];}).join('').toUpperCase(); }
function paid(c) { return c.payments.reduce(function(s,p){return s+p.amount;},0); }
function bal(c) { return c.agreed - paid(c); }
function pct(c) { return Math.min(100, Math.round(paid(c)/c.agreed*100)); }

function showTab(id) {
  document.querySelectorAll('.tab').forEach(function(t,i){
    t.classList.toggle('active', ['muvekkiller','yeni'][i]===id);
  });
  document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active');});
  document.getElementById(id).classList.add('active');
  if(id==='muvekkiller') loadData();
}

function loadData() {
  document.getElementById('client-list').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  google.script.run.withSuccessHandler(function(data){
    allData = data;
    renderClients();
  }).getMuvekkiller();
}

function renderClients() {
  var filter = document.getElementById('filter').value;
  var search = document.getElementById('search').value.toLowerCase();
  var items = allData.filter(function(c){
    if(filter==='bekleyen' && bal(c)<=0) return false;
    if(filter==='tamam' && bal(c)>0) return false;
    if(search && c.name.toLowerCase().indexOf(search)<0) return false;
    return true;
  });
  if(items.length===0){
    document.getElementById('client-list').innerHTML='<div class="loading">Müvekkil bulunamadı</div>';
    return;
  }
  document.getElementById('client-list').innerHTML = items.map(function(c){
    var i = allData.indexOf(c);
    var b = bal(c);
    var badge = b<=0 ? '<span class="badge b-ok">Tamamlandı</span>'
      : paid(c)===0 ? '<span class="badge b-err">Ödeme yok</span>'
      : '<span class="badge b-warn">Kısmi</span>';
    var meta = [c.court, c.city, c.dosya].filter(Boolean).join(' • ') || 'Detay girilmemiş';
    var pays = c.payments.length===0
      ? '<div style="font-size:11px;color:#9ca3af;font-style:italic;padding:3px 0">Henüz ödeme girilmemiş</div>'
      : c.payments.map(function(p){
          var d = p.date ? new Date(p.date).toLocaleDateString('tr-TR') : '—';
          return '<div class="pay-row"><span style="color:#6b7280">'+d+'</span><span style="font-weight:bold">'+fmt(p.amount)+'</span></div>';
        }).join('');
    var ozetText = c.ozet || '';
    return '<div class="card">'
      +'<div class="card-header" onclick="tog('+i+')">'
        +'<div style="display:flex;align-items:center;gap:8px">'
          +'<div class="avatar">'+ini(c.name)+'</div>'
          +'<div><div class="client-name">'+c.name+'</div><div class="client-sub">'+meta+'</div></div>'
        +'</div>'
        +'<div style="display:flex;align-items:center;gap:6px">'
          +badge
          +'<span style="font-size:10px;color:#6b7280">'+(b>0?fmt(b):'')+'</span>'
          +'<span class="arrow" id="arr-'+i+'">▼</span>'
        +'</div>'
      +'</div>'
      +'<div class="card-body" id="bd-'+i+'">'
        +'<div class="inner-tabs">'
          +'<button class="itab active" id="it-odeme-'+i+'" onclick="showInner('+i+',\'odeme\')">Ödeme Takibi</button>'
          +'<button class="itab" id="it-ozet-'+i+'" onclick="showInner('+i+',\'ozet\')">Dosya Özeti</button>'
        +'</div>'
        +'<div class="ipane active" id="ip-odeme-'+i+'">'
          +'<div class="stats3">'
            +'<div class="stat"><div class="stat-l">Anlaşılan</div><div class="stat-v">'+fmt(c.agreed)+'</div></div>'
            +'<div class="stat"><div class="stat-l">Tahsil</div><div class="stat-v" style="color:#059669">'+fmt(paid(c))+'</div></div>'
            +'<div class="stat"><div class="stat-l">Bakiye</div><div class="stat-v" style="color:'+(b>0?'#dc2626':'#059669')+'">'+fmt(b)+'</div></div>'
          +'</div>'
          +'<div class="pbar"><div class="pfill" style="width:'+pct(c)+'%"></div></div>'
          +'<div style="font-size:10px;color:#9ca3af;text-align:right;margin-bottom:10px">'+pct(c)+'% tahsil edildi</div>'
          +'<div class="slabel">Ödeme geçmişi</div>'
          +'<div id="pays-'+i+'">'+pays+'</div>'
          +'<button class="sm-btn" onclick="togForm('+i+')">+ Ödeme ekle</button>'
          +'<div class="add-form" id="form-'+i+'">'
            +'<input type="date" id="d-'+i+'">'
            +'<input type="number" id="a-'+i+'" placeholder="Tutar (TRY)">'
            +'<button class="sm-btn" onclick="addPay('+i+')">Kaydet</button>'
          +'</div>'
        +'</div>'
        +'<div class="ipane" id="ip-ozet-'+i+'">'
          +'<div class="slabel">Dava notları</div>'
          +'<div class="ozet-view'+(ozetText?'':' empty')+'" id="ov-'+i+'" onclick="editOzet('+i+')">'+(ozetText||'Henüz not eklenmemiş. Düzenlemek için tıklayın.')+'</div>'
          +'<textarea class="ozet-edit" id="oe-'+i+'" placeholder="Davanın konusu, suçlama, önemli gelişmeler, duruşma tarihleri...">'+ozetText+'</textarea>'
          +'<div class="edit-actions" id="ea-'+i+'">'
            +'<button class="sm-btn" onclick="saveOzet('+i+')">Kaydet</button>'
            +'<button class="sm-btn" onclick="cancelOzet('+i+')">İptal</button>'
          +'</div>'
        +'</div>'
      +'</div>'
    +'</div>';
  }).join('');
}

function tog(i){
  document.getElementById('bd-'+i).classList.toggle('open');
  document.getElementById('arr-'+i).classList.toggle('open');
}
function showInner(i,tab){
  ['odeme','ozet'].forEach(function(t){
    document.getElementById('it-'+t+'-'+i).classList.toggle('active',t===tab);
    document.getElementById('ip-'+t+'-'+i).classList.toggle('active',t===tab);
  });
}
function togForm(i){ document.getElementById('form-'+i).classList.toggle('open'); }

function addPay(i){
  var d = document.getElementById('d-'+i).value;
  var a = parseInt(document.getElementById('a-'+i).value);
  if(!a||a<=0) return;
  var c = allData[i];
  google.script.run.withSuccessHandler(function(){
    allData[i].payments.push({date:d, amount:a});
    renderClients();
    document.getElementById('bd-'+i).classList.add('open');
    showInner(i,'odeme');
  }).addOdeme({id:c.id, name:c.name, date:d, amount:a});
}

function editOzet(i){
  document.getElementById('ov-'+i).style.display='none';
  document.getElementById('oe-'+i).style.display='block';
  document.getElementById('ea-'+i).classList.add('open');
  document.getElementById('oe-'+i).focus();
}
function saveOzet(i){
  var val = document.getElementById('oe-'+i).value.trim();
  var c = allData[i];
  google.script.run.withSuccessHandler(function(){
    allData[i].ozet = val;
    var ov = document.getElementById('ov-'+i);
    ov.textContent = val || 'Henüz not eklenmemiş. Düzenlemek için tıklayın.';
    ov.className = 'ozet-view' + (val?'':' empty');
    ov.style.display='block';
    document.getElementById('oe-'+i).style.display='none';
    document.getElementById('ea-'+i).classList.remove('open');
  }).saveOzet(c.id, val);
}
function cancelOzet(i){
  document.getElementById('oe-'+i).value = allData[i].ozet||'';
  document.getElementById('ov-'+i).style.display='block';
  document.getElementById('oe-'+i).style.display='none';
  document.getElementById('ea-'+i).classList.remove('open');
}

function addClient(){
  var name = document.getElementById('n-name').value.trim();
  var agreed = parseInt(document.getElementById('n-agreed').value)||0;
  if(!name||!agreed){ alert('Ad Soyad ve Anlaşılan Ücret zorunludur.'); return; }
  var client = {
    name: name,
    tckn: document.getElementById('n-tckn').value,
    court: document.getElementById('n-court').value,
    city: document.getElementById('n-city').value,
    dosya: document.getElementById('n-dosya').value,
    agreed: agreed,
    firstpay: parseInt(document.getElementById('n-firstpay').value)||0,
    firstdate: document.getElementById('n-firstdate').value,
    ozet: document.getElementById('n-ozet').value.trim()
  };
  google.script.run.withSuccessHandler(function(){
    ['n-name','n-tckn','n-court','n-city','n-dosya','n-agreed','n-firstpay','n-firstdate','n-ozet'].forEach(function(id){
      document.getElementById(id).value='';
    });
    var msg = document.getElementById('success-msg');
    msg.style.display='block';
    setTimeout(function(){ msg.style.display='none'; showTab('muvekkiller'); }, 1500);
  }).addMuvekkil(client);
}

document.getElementById('search').addEventListener('input', renderClients);
document.getElementById('filter').addEventListener('change', renderClients);

loadData();
</script>
</body>
</html>
